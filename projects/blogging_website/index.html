<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">MyBlog</h1>
            <nav class="nav">
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#posts">Posts</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main">
        <section class="hero">
            <div class="container">
                <h2>Welcome to My Blog</h2>
                <p>Sharing thoughts, ideas, and experiences on various topics</p>
            </div>
        </section>

        <section class="add-post-section">
            <div class="container">
                <h3>Add a New Post</h3>
                <form id="postForm" class="post-form">
                    <input type="text" id="postTitle" placeholder="Post Title" required>
                    <textarea id="postContent" placeholder="Post Content" rows="5" required></textarea>
                    <button type="submit" class="btn-submit">Publish Post</button>
                </form>
            </div>
        </section>

        <section class="posts-section" id="posts">
            <div class="container">
                <h3>Latest Posts</h3>
                <div id="postsList" class="posts-list">
                    <!-- Posts will be added here dynamically -->
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 MyBlog. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
