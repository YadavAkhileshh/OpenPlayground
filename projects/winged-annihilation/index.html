<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wing Annihilation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div class="score-box">
            <div class="label">Score</div>
            <div class="value" id="scoreDisplay">0</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
            <div id="livesBar"></div>
            <div style="color:rgba(255,255,255,0.3);font-size:12px;letter-spacing:1px">ESCAPED: <span
                    id="escapedDisplay" style="color:#ff3366">0</span>/20</div>
        </div>
        <div class="score-box" style="text-align:right">
            <div class="label">Best</div>
            <div class="value" id="hiScoreDisplay">0</div>
        </div>
    </div>

    <div id="comboDisplay">COMBO x<span id="comboCount">2</span>!</div>

    <button id="sprayBtn">
        ⚡ ALL OUT
        <span id="cooldownTimer"></span>
    </button>

    <div id="sprayOverlay"></div>
    <div id="difficultyNotice">⚡ SPEED UP!</div>

    <div id="overlay">
        <div class="mosquito-icon">🦟</div>
        <h1>MOSQUITO SMASH</h1>
        <div class="sub">RACKET RAGE</div>
        <div id="finalScore" style="display:none">
            <div class="final-score" id="finalScoreVal">0</div>
            <div class="hi-score-line" id="hiScoreLine"></div>
        </div>
        <button id="startBtn">▶ PLAY</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
