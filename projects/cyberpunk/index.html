<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tokyo · Cyberpunk 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', 'Arial', sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(5, 5, 15, 0.75);
            backdrop-filter: blur(8px);
            color: #00ffff;
            padding: 12px 28px;
            border-radius: 50px;
            border: 2px solid #ff00ff;
            pointer-events: none;
            box-shadow: 0 0 30px rgba(0,255,255,0.3);
            font-size: 0.95rem;
        }
        #info span {
            color: #ffff00;
            font-weight: 600;
        }
        #controls-note {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,10,20,0.6);
            backdrop-filter: blur(4px);
            color: #88ffff;
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid #00ffff;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div id="info">
        🌃 <span>NEON TOKYO</span> · cyberpunk 3D · rain & flying cars
    </div>
    <div id="controls-note">
        🖱️ drag to rotate · scroll to zoom
    </div>

    <!-- Import Three.js and add-ons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- setup scene ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a); // dark night
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(25, 15, 35);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);
        
        // optional CSS2 renderer for labels
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.6;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.minDistance = 15;
        controls.maxDistance = 60;
        
        // --- lighting ---
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);
        
        // neon lights (colored point lights)
        const colors = [0xff00ff, 0x00ffff, 0xffff00, 0x00ffaa, 0xffaa00];
        for (let i = 0; i < 20; i++) {
            const light = new THREE.PointLight(colors[Math.floor(Math.random() * colors.length)], 1.5, 25);
            light.position.set(
                (Math.random() - 0.5) * 40,
                5 + Math.random() * 15,
                (Math.random() - 0.5) * 40
            );
            scene.add(light);
        }
        
        // directional light (moon)
        const moonLight = new THREE.DirectionalLight(0xaaccff, 0.8);
        moonLight.position.set(-15, 30, 20);
        moonLight.castShadow = true;
        moonLight.shadow.mapSize.width = 1024;
        moonLight.shadow.mapSize.height = 1024;
        const d = 40;
        moonLight.shadow.camera.left = -d;
        moonLight.shadow.camera.right = d;
        moonLight.shadow.camera.top = d;
        moonLight.shadow.camera.bottom = -d;
        moonLight.shadow.camera.near = 1;
        moonLight.shadow.camera.far = 60;
        scene.add(moonLight);
        
        // --- ground (reflective) ---
        const groundGeo = new THREE.CircleGeometry(50, 32);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x111122, emissive: 0x111122, roughness: 0.3, metalness: 0.7 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // grid on ground
        const gridHelper = new THREE.GridHelper(100, 40, 0x00ffff, 0x440066);
        gridHelper.position.y = -0.4;
        scene.add(gridHelper);
        
        // --- buildings (skyscrapers) ---
        function createBuilding(x, z, height, color) {
            const geo = new THREE.BoxGeometry(1.2, height, 1.2);
            const mat = new THREE.MeshStandardMaterial({ color: color, emissive: 0x111122 });
            const building = new THREE.Mesh(geo, mat);
            building.position.set(x, height/2 - 0.5, z);
            building.castShadow = true;
            building.receiveShadow = true;
            return building;
        }
        
        // grid of buildings
        for (let i = -8; i <= 8; i+=2) {
            for (let j = -8; j <= 8; j+=2) {
                if (Math.random() > 0.3) {
                    const height = 3 + Math.random() * 8;
                    const colors = [0x3355aa, 0xaa3355, 0x33aa55, 0xaa55aa, 0x55aa55];
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const building = createBuilding(i*2, j*2, height, color);
                    scene.add(building);
                    
                    // add windows (tiny lights)
                    if (Math.random() > 0.5) {
                        const windowLight = new THREE.Mesh(
                            new THREE.SphereGeometry(0.1, 3),
                            new THREE.MeshStandardMaterial({ color: 0xffdd99, emissive: 0x442200 })
                        );
                        windowLight.position.set(i*2 + 0.3, height * 0.7, j*2 + 0.3);
                        scene.add(windowLight);
                    }
                }
            }
        }
        
        // --- central tower (landmark) ---
        const towerGroup = new THREE.Group();
        towerGroup.position.set(0, 0, 0);
        
        const towerBase = new THREE.Mesh(
            new THREE.CylinderGeometry(2, 2.5, 12, 8),
            new THREE.MeshStandardMaterial({ color: 0x88aaff, emissive: 0x113366 })
        );
        towerBase.position.y = 5.5;
        towerBase.castShadow = true;
        towerBase.receiveShadow = true;
        towerGroup.add(towerBase);
        
        const towerTop = new THREE.Mesh(
            new THREE.ConeGeometry(1.5, 3, 6),
            new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 })
        );
        towerTop.position.y = 12;
        towerTop.castShadow = true;
        towerGroup.add(towerTop);
        
        scene.add(towerGroup);
        
        // --- flying vehicles (hover cars) ---
        const vehicles = [];
        function createVehicle() {
            const group = new THREE.Group();
            
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(1.0, 0.3, 2.0),
                new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x331100 })
            );
            body.castShadow = true;
            group.add(body);
            
            const cockpit = new THREE.Mesh(
                new THREE.SphereGeometry(0.3, 4),
                new THREE.MeshStandardMaterial({ color: 0x88aaff, emissive: 0x112244 })
            );
            cockpit.position.set(0, 0.2, 0.4);
            group.add(cockpit);
            
            return group;
        }
        
        for (let i = 0; i < 12; i++) {
            const vehicle = createVehicle();
            const angle = Math.random() * Math.PI * 2;
            const radius = 10 + Math.random() * 15;
            const height = 8 + Math.random() * 8;
            vehicle.position.set(
                Math.cos(angle) * radius,
                height,
                Math.sin(angle) * radius
            );
            vehicle.userData = {
                angle: angle,
                radius: radius,
                height: height,
                speed: 0.005 + Math.random() * 0.005
            };
            scene.add(vehicle);
            vehicles.push(vehicle);
        }
        
        // --- neon signs (floating text) ---
        const signs = [
            { text: 'NEON', color: '#ff00ff', pos: [8, 6, 5] },
            { text: 'CYBER', color: '#00ffff', pos: [-7, 5, -8] },
            { text: '2088', color: '#ffff00', pos: [5, 8, -6] },
            { text: 'TOKYO', color: '#ffaa00', pos: [-6, 7, 7] }
        ];
        
        signs.forEach(s => {
            const div = document.createElement('div');
            div.textContent = s.text;
            div.style.color = s.color;
            div.style.fontSize = '28px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = `0 0 20px ${s.color}`;
            div.style.background = 'rgba(0,0,0,0.5)';
            div.style.padding = '4px 16px';
            div.style.borderRadius = '20px';
            div.style.border = `2px solid ${s.color}`;
            const label = new CSS2DObject(div);
            label.position.set(s.pos[0], s.pos[1], s.pos[2]);
            scene.add(label);
        });
        
        // --- rain particles ---
        const rainGeo = new THREE.BufferGeometry();
        const rainCount = 2000;
        const rainPos = new Float32Array(rainCount * 3);
        const rainVel = [];
        for (let i = 0; i < rainCount * 3; i += 3) {
            rainPos[i] = (Math.random() - 0.5) * 100;
            rainPos[i+1] = Math.random() * 50;
            rainPos[i+2] = (Math.random() - 0.5) * 100;
            rainVel.push(0.1 + Math.random() * 0.2);
        }
        rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
        const rainMat = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.1, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
        const rain = new THREE.Points(rainGeo, rainMat);
        scene.add(rain);
        
        // --- fog ---
        scene.fog = new THREE.FogExp2(0x0a0a1a, 0.002);
        
        // --- animation loop ---
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.01;
            
            // move vehicles
            vehicles.forEach(v => {
                v.userData.angle += v.userData.speed;
                v.position.x = Math.cos(v.userData.angle) * v.userData.radius;
                v.position.z = Math.sin(v.userData.angle) * v.userData.radius;
                v.position.y = v.userData.height + Math.sin(time * 2 + v.userData.angle) * 1;
                v.rotation.y = v.userData.angle + Math.PI/2;
            });
            
            // rain fall
            const positions = rain.geometry.attributes.position.array;
            for (let i = 1; i < positions.length; i += 3) {
                positions[i] -= rainVel[Math.floor(i/3)] * 0.5;
                if (positions[i] < -2) {
                    positions[i] = 40;
                    positions[i-1] = (Math.random() - 0.5) * 100;
                    positions[i+1] = (Math.random() - 0.5) * 100;
                }
            }
            rain.geometry.attributes.position.needsUpdate = true;
            
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        // --- resize handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
