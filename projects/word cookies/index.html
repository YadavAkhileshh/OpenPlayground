<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Cookies Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600&display=swap');

        :root {
            --cookie-brown: #d2691e;
            --cookie-light: #f4a460;
            --bg-color: #fff5e6;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle at center, #fff9f0 0%, #ffe4bc 100%);
            touch-action: none;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title-font {
            font-family: 'Fredoka One', cursive;
        }

        /* Baking Board Style */
        .game-header {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            border-bottom: 2px solid rgba(210, 105, 30, 0.1);
        }

        .cookie-btn {
            background: radial-gradient(circle at 30% 30%, #f4a460, #d2691e);
            box-shadow: 0 6px 0 #8b4513, 0 8px 15px rgba(0,0,0,0.2);
            transition: transform 0.1s ease, filter 0.2s ease;
            user-select: none;
            z-index: 10;
        }

        .cookie-btn.selected {
            filter: brightness(1.2) saturate(1.3);
            transform: scale(1.15);
            box-shadow: 0 0 15px #f4a460, 0 2px 0 #8b4513;
        }

        .word-slot {
            min-width: 42px;
            height: 48px;
            background: rgba(139, 69, 19, 0.05);
            border-radius: 8px;
            border-bottom: 4px solid #8b4513;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fredoka One', cursive;
            font-size: 1.6rem;
            color: #5d2e0a;
            margin: 0 4px;
            transition: all 0.3s ease;
        }

        .word-slot.filled {
            background: #fff;
            border-bottom-color: transparent;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .found-anim {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.3) rotate(5deg); }
            100% { transform: scale(1); }
        }

        .pan-container {
            background: #333;
            background-image: radial-gradient(#444 20%, transparent 20%);
            background-size: 10px 10px;
            border: 8px solid #555;
            border-radius: 50%;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 15px 30px rgba(0,0,0,0.4);
            position: relative;
        }

        canvas#connection-canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 5;
        }

        .wrong-shake {
            animation: shake 0.5s;
            color: #ef4444 !important;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-8px); }
            80% { transform: translateX(8px); }
        }

        .success-overlay {
            background: rgba(45, 24, 0, 0.85);
            backdrop-filter: blur(8px);
        }

        .sparkle {
            position: absolute;
            pointer-events: none;
            background: white;
            border-radius: 50%;
            animation: sparkle-anim 0.6s forwards;
        }

        @keyframes sparkle-anim {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body class="py-4 px-4 select-none">

    <!-- Header -->
    <div class="w-full max-w-md flex justify-between items-center px-6 py-4 rounded-3xl game-header mb-4">
        <div class="flex flex-col">
            <span class="text-[10px] uppercase font-bold text-orange-800/60 tracking-wider">Level</span>
            <span id="level-display" class="title-font text-3xl text-orange-700">1</span>
        </div>
        <div class="text-center">
            <h1 class="title-font text-2xl text-orange-900 leading-none">WORD</h1>
            <h1 class="title-font text-2xl text-orange-700 leading-none">COOKIES</h1>
        </div>
        <div class="flex flex-col items-end">
            <span class="text-[10px] uppercase font-bold text-orange-800/60 tracking-wider">Score</span>
            <span id="score-display" class="title-font text-3xl text-orange-700">0</span>
        </div>
    </div>

    <!-- Word Board -->
    <div id="word-board" class="w-full max-w-md flex flex-wrap justify-center content-start gap-y-6 py-4 overflow-y-auto max-h-[35vh]">
        <!-- Slots generated by JS -->
    </div>

    <!-- Current Spelling Preview -->
    <div class="h-16 flex items-center justify-center">
        <div id="current-word" class="title-font text-4xl text-orange-950 tracking-widest uppercase transition-all duration-200"></div>
    </div>

    <!-- Game Controls / Letters -->
    <div class="w-full max-w-md flex flex-col items-center gap-4 mt-auto">
        <div id="pan" class="pan-container w-72 h-72 md:w-80 md:h-80 flex items-center justify-center">
            <canvas id="connection-canvas"></canvas>
            <div id="letter-circle" class="relative w-full h-full">
                <!-- Letters generated by JS -->
            </div>
            
            <!-- Center Buttons -->
            <div class="absolute flex gap-4 pointer-events-auto z-20">
                <button onclick="shuffleLetters()" class="bg-white/10 hover:bg-white/20 p-3 rounded-full transition-colors border border-white/10">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m21 9-9-9-9 9"/><path d="M12 0v24"/><path d="m21 15-9 9-9-9"/></svg>
                </button>
                <button onclick="clearCurrentWord()" class="bg-white/10 hover:bg-white/20 p-3 rounded-full transition-colors border border-white/10">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
        </div>
        
        <p class="text-orange-800/50 text-sm font-bold uppercase tracking-widest animate-pulse">Drag to Connect</p>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="fixed inset-0 success-overlay z-50 hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-[40px] p-10 w-full max-w-sm text-center shadow-2xl transform">
            <div class="text-7xl mb-6">👨‍🍳</div>
            <h2 class="title-font text-4xl text-orange-800 mb-2">Chef-tastic!</h2>
            <p class="text-gray-500 mb-8 font-medium">You've mastered these ingredients.</p>
            <div class="bg-orange-50 rounded-3xl p-6 mb-8 border-2 border-orange-100">
                <p class="text-xs uppercase font-black text-orange-400 tracking-tighter mb-1">Level Reward</p>
                <p id="bonus-display" class="title-font text-4xl text-orange-600">+100</p>
            </div>
            <button onclick="nextLevel()" class="w-full bg-orange-600 text-white title-font py-5 rounded-2xl text-2xl shadow-[0_8px_0_#c2410c] active:shadow-none active:translate-y-2 hover:bg-orange-500 transition-all">
                NEXT BATCH
            </button>
        </div>
    </div>

    <script>
        const LEVELS = [
            { letters: ['A', 'T', 'E'], words: ['EAT', 'ATE', 'TEA', 'AT'] },
            { letters: ['O', 'W', 'L', 'S'], words: ['OWL', 'OWLS', 'LOW', 'SLOW', 'SOLO'] },
            { letters: ['B', 'E', 'A', 'R'], words: ['BEAR', 'BARE', 'BEAK', 'EAR', 'ARE', 'ERA', 'BAR'] },
            { letters: ['S', 'M', 'I', 'L', 'E'], words: ['SMILE', 'MILE', 'LIME', 'SLIM', 'SLIME', 'LIE'] },
            { letters: ['C', 'O', 'O', 'K', 'I', 'E'], words: ['COOKIE', 'COOK', 'COKE', 'ICE', 'ICE'] },
            { letters: ['P', 'L', 'A', 'N', 'E', 'T'], words: ['PLANET', 'PLANE', 'PLATE', 'PLANT', 'PANT', 'LEAN', 'NEAT', 'TEN', 'PEN', 'TEA', 'ATE', 'EAT'] }
        ];

        let currentLevelIndex = 0;
        let score = 0;
        let currentGuess = "";
        let selectedIndices = [];
        let foundWords = [];
        let isDragging = false;

        const wordBoard = document.getElementById('word-board');
        const currentWordDisplay = document.getElementById('current-word');
        const letterCircle = document.getElementById('letter-circle');
        const levelDisplay = document.getElementById('level-display');
        const scoreDisplay = document.getElementById('score-display');
        const successModal = document.getElementById('success-modal');
        const canvas = document.getElementById('connection-canvas');
        const ctx = canvas.getContext('2d');
        const pan = document.getElementById('pan');

        function initLevel() {
            const level = LEVELS[currentLevelIndex];
            foundWords = [];
            currentGuess = "";
            selectedIndices = [];
            
            levelDisplay.innerText = currentLevelIndex + 1;
            currentWordDisplay.innerText = "";
            
            wordBoard.innerHTML = "";
            const sortedWords = [...level.words].sort((a, b) => a.length - b.length);
            
            sortedWords.forEach(word => {
                const wordContainer = document.createElement('div');
                wordContainer.className = "flex mb-2 mx-2";
                wordContainer.dataset.word = word;
                
                for(let i=0; i<word.length; i++) {
                    const slot = document.createElement('div');
                    slot.className = "word-slot";
                    wordContainer.appendChild(slot);
                }
                wordBoard.appendChild(wordContainer);
            });

            resizeCanvas();
            renderLetters();
        }

        function resizeCanvas() {
            canvas.width = pan.offsetWidth;
            canvas.height = pan.offsetHeight;
        }

        function renderLetters() {
            const level = LEVELS[currentLevelIndex];
            const letters = level.letters;
            letterCircle.innerHTML = "";
            
            const radius = pan.offsetWidth * 0.35;
            const centerX = pan.offsetWidth / 2;
            const centerY = pan.offsetHeight / 2;

            letters.forEach((letter, i) => {
                const angle = (i / letters.length) * (2 * Math.PI) - (Math.PI / 2);
                const x = Math.cos(angle) * radius + centerX;
                const y = Math.sin(angle) * radius + centerY;

                const btn = document.createElement('div');
                btn.className = "cookie-btn absolute w-16 h-16 rounded-full text-white title-font text-2xl flex items-center justify-center cursor-pointer touch-none";
                btn.style.left = `${x - 32}px`;
                btn.style.top = `${y - 32}px`;
                btn.innerText = letter;
                btn.dataset.index = i;
                
                // Event Listeners for Drag-to-Connect
                btn.addEventListener('pointerdown', (e) => startDrag(e, i, letter));
                btn.addEventListener('pointerenter', (e) => {
                    if (isDragging) handleEnter(i, letter);
                });

                letterCircle.appendChild(btn);
            });
        }

        function startDrag(e, index, letter) {
            isDragging = true;
            selectLetter(letter, index);
            pan.setPointerCapture(e.pointerId);
            
            const handleMove = (e) => {
                if (!isDragging) return;
                const rect = canvas.getBoundingClientRect();
                drawLines(e.clientX - rect.left, e.clientY - rect.top);
                
                // Check if hovering over another letter (for touch devices primarily)
                const element = document.elementFromPoint(e.clientX, e.clientY);
                if (element && element.classList.contains('cookie-btn')) {
                    const idx = parseInt(element.dataset.index);
                    const char = element.innerText;
                    handleEnter(idx, char);
                }
            };

            const handleUp = () => {
                isDragging = false;
                checkWord();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                pan.removeEventListener('pointermove', handleMove);
                pan.removeEventListener('pointerup', handleUp);
            };

            pan.addEventListener('pointermove', handleMove);
            pan.addEventListener('pointerup', handleUp);
        }

        function handleEnter(index, letter) {
            if (!selectedIndices.includes(index)) {
                selectLetter(letter, index);
                if (window.navigator.vibrate) window.navigator.vibrate(15);
            }
        }

        function selectLetter(letter, index) {
            selectedIndices.push(index);
            currentGuess += letter;
            document.querySelector(`.cookie-btn[data-index="${index}"]`).classList.add('selected');
            currentWordDisplay.innerText = currentGuess;
            createSparkle(index);
        }

        function drawLines(mouseX, mouseY) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (selectedIndices.length === 0) return;

            ctx.beginPath();
            ctx.lineWidth = 12;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.strokeStyle = "rgba(244, 164, 96, 0.7)";

            selectedIndices.forEach((idx, i) => {
                const btn = document.querySelector(`.cookie-btn[data-index="${idx}"]`);
                const x = btn.offsetLeft + 32;
                const y = btn.offsetTop + 32;

                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });

            if (isDragging) ctx.lineTo(mouseX, mouseY);
            ctx.stroke();
        }

        function createSparkle(index) {
            const btn = document.querySelector(`.cookie-btn[data-index="${index}"]`);
            for(let i=0; i<5; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.style.left = `${btn.offsetLeft + 32}px`;
                s.style.top = `${btn.offsetTop + 32}px`;
                s.style.width = s.style.height = `${Math.random() * 10 + 5}px`;
                pan.appendChild(s);
                setTimeout(() => s.remove(), 600);
            }
        }

        function checkWord() {
            const level = LEVELS[currentLevelIndex];
            if (currentGuess.length < 2) {
                clearCurrentWord();
                return;
            }

            if (level.words.includes(currentGuess) && !foundWords.includes(currentGuess)) {
                revealWord(currentGuess);
                foundWords.push(currentGuess);
                updateScore(currentGuess.length * 15);
                
                if (foundWords.length === level.words.length) {
                    setTimeout(showLevelComplete, 800);
                }
            } else {
                currentWordDisplay.classList.add('wrong-shake');
                setTimeout(() => currentWordDisplay.classList.remove('wrong-shake'), 500);
            }
            
            clearCurrentWord();
        }

        function revealWord(word) {
            const wordContainer = Array.from(document.querySelectorAll('[data-word]'))
                .find(el => el.dataset.word === word);
            
            if (wordContainer) {
                const slots = wordContainer.querySelectorAll('.word-slot');
                slots.forEach((slot, i) => {
                    setTimeout(() => {
                        slot.innerText = word[i];
                        slot.classList.add('found-anim', 'filled');
                    }, i * 100);
                });
            }
        }

        function clearCurrentWord() {
            currentGuess = "";
            selectedIndices = [];
            currentWordDisplay.innerText = "";
            document.querySelectorAll('.cookie-btn').forEach(btn => btn.classList.remove('selected'));
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function shuffleLetters() {
            const level = LEVELS[currentLevelIndex];
            level.letters.sort(() => Math.random() - 0.5);
            clearCurrentWord();
            renderLetters();
        }

        function updateScore(points) {
            score += points;
            scoreDisplay.innerText = score;
        }

        function showLevelComplete() {
            successModal.classList.remove('hidden');
            document.getElementById('bonus-display').innerText = `+${(currentLevelIndex + 1) * 50}`;
        }

        function nextLevel() {
            updateScore((currentLevelIndex + 1) * 50);
            currentLevelIndex = (currentLevelIndex + 1) % LEVELS.length;
            successModal.classList.add('hidden');
            initLevel();
        }

        window.onload = () => {
            initLevel();
            window.addEventListener('resize', () => {
                resizeCanvas();
                renderLetters();
            });
        };
    </script>
</body>
</html>
