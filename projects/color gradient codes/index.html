<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient Pro - Color Gradient Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .preview-box {
            transition: background 0.3s ease;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
        }
        .custom-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 44px;
            height: 44px;
            cursor: pointer;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid #e2e8f0;
            border-radius: 8px;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex items-center justify-center">

    <div class="max-w-4xl w-full bg-white rounded-3xl custom-shadow overflow-hidden flex flex-col md:flex-row">
        
        <!-- Sidebar Controls -->
        <div class="w-full md:w-80 p-6 border-b md:border-b-0 md:border-r border-gray-100 bg-gray-50/50">
            <h1 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600"><path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                Gradient Pro
            </h1>

            <div class="space-y-6">
                <!-- Type Toggle -->
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-3">Gradient Type</label>
                    <div class="flex p-1 bg-gray-200 rounded-xl">
                        <button id="linearBtn" class="flex-1 py-2 text-sm font-medium rounded-lg bg-white shadow-sm text-gray-800 transition-all">Linear</button>
                        <button id="radialBtn" class="flex-1 py-2 text-sm font-medium rounded-lg text-gray-600 hover:text-gray-800 transition-all">Radial</button>
                    </div>
                </div>

                <!-- Colors -->
                <div class="space-y-4">
                    <label class="block text-sm font-semibold text-gray-600">Colors</label>
                    <div class="flex items-center gap-4 bg-white p-3 rounded-xl border border-gray-200">
                        <input type="color" id="color1" value="#3b82f6">
                        <div class="flex-1">
                            <p class="text-xs text-gray-400 font-mono" id="hexText1">#3b82f6</p>
                            <input type="text" id="colorInput1" value="#3b82f6" class="w-full text-sm font-mono border-none focus:ring-0 p-0 uppercase">
                        </div>
                    </div>
                    <div class="flex items-center gap-4 bg-white p-3 rounded-xl border border-gray-200">
                        <input type="color" id="color2" value="#8b5cf6">
                        <div class="flex-1">
                            <p class="text-xs text-gray-400 font-mono" id="hexText2">#8b5cf6</p>
                            <input type="text" id="colorInput2" value="#8b5cf6" class="w-full text-sm font-mono border-none focus:ring-0 p-0 uppercase">
                        </div>
                    </div>
                </div>

                <!-- Direction -->
                <div id="directionControl">
                    <label class="block text-sm font-semibold text-gray-600 mb-3 flex justify-between">
                        Direction 
                        <span id="angleValue" class="text-blue-600">90°</span>
                    </label>
                    <input type="range" id="angle" min="0" max="360" value="90" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                    <div class="grid grid-cols-4 gap-2 mt-4">
                        <button data-deg="0" class="angle-preset py-1 text-xs border border-gray-200 rounded hover:bg-white">Top</button>
                        <button data-deg="90" class="angle-preset py-1 text-xs border border-gray-200 rounded hover:bg-white">Right</button>
                        <button data-deg="180" class="angle-preset py-1 text-xs border border-gray-200 rounded hover:bg-white">Bottom</button>
                        <button data-deg="270" class="angle-preset py-1 text-xs border border-gray-200 rounded hover:bg-white">Left</button>
                    </div>
                </div>

                <button id="randomize" class="w-full py-3 bg-gray-800 text-white rounded-xl font-medium hover:bg-black transition-colors flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22"/><path d="m18 2 4 4-4 4"/><path d="M2 6h1.9c1.6 0 3.1.9 3.9 2.3l.3.5"/><path d="m18 14 4 4-4 4"/><path d="M11.5 15.5c.7 1.1 2 1.7 3.3 1.7H22"/></svg>
                    Randomize
                </button>
            </div>
        </div>

        <!-- Main Preview Area -->
        <div class="flex-1 p-6 md:p-10 flex flex-col">
            <div id="preview" class="preview-box w-full flex-1 rounded-2xl mb-8 relative group">
                <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                    <span class="bg-white/20 backdrop-blur-md text-white px-4 py-2 rounded-full text-sm font-medium border border-white/30">Preview Area</span>
                </div>
            </div>

            <div class="bg-gray-900 rounded-2xl p-6 relative overflow-hidden">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-gray-400 text-xs font-bold uppercase tracking-widest">CSS Output</h3>
                    <button id="copyBtn" class="text-white bg-blue-600 hover:bg-blue-500 px-4 py-1.5 rounded-lg text-sm font-medium transition-all active:scale-95">
                        Copy Code
                    </button>
                </div>
                <code id="cssCode" class="block text-blue-300 font-mono text-sm leading-relaxed break-all">
                    background: linear-gradient(90deg, #3b82f6, #8b5cf6);
                </code>
            </div>
            
            <div id="toast" class="fixed bottom-8 right-8 bg-gray-800 text-white px-6 py-3 rounded-xl shadow-2xl transform translate-y-20 transition-transform duration-300 opacity-0 pointer-events-none">
                CSS copied to clipboard!
            </div>
        </div>
    </div>

    <script>
        const color1 = document.getElementById('color1');
        const color2 = document.getElementById('color2');
        const colorInput1 = document.getElementById('colorInput1');
        const colorInput2 = document.getElementById('colorInput2');
        const angleInput = document.getElementById('angle');
        const angleValue = document.getElementById('angleValue');
        const preview = document.getElementById('preview');
        const cssCode = document.getElementById('cssCode');
        const copyBtn = document.getElementById('copyBtn');
        const linearBtn = document.getElementById('linearBtn');
        const radialBtn = document.getElementById('radialBtn');
        const directionControl = document.getElementById('directionControl');
        const randomizeBtn = document.getElementById('randomize');
        const toast = document.getElementById('toast');

        let gradientType = 'linear-gradient';

        function updateGradient() {
            let gradientStr = '';
            const c1 = color1.value;
            const c2 = color2.value;
            
            colorInput1.value = c1;
            colorInput2.value = c2;
            document.getElementById('hexText1').textContent = c1;
            document.getElementById('hexText2').textContent = c2;

            if (gradientType === 'linear-gradient') {
                const angle = angleInput.value;
                angleValue.textContent = angle + '°';
                gradientStr = `${gradientType}(${angle}deg, ${c1}, ${c2})`;
            } else {
                gradientStr = `${gradientType}(circle, ${c1}, ${c2})`;
            }

            preview.style.background = gradientStr;
            const fullCss = `background: ${gradientStr};`;
            cssCode.textContent = fullCss;
        }

        // Color sync
        color1.addEventListener('input', updateGradient);
        color2.addEventListener('input', updateGradient);
        
        colorInput1.addEventListener('input', (e) => {
            if (/^#[0-9A-F]{6}$/i.test(e.target.value)) {
                color1.value = e.target.value;
                updateGradient();
            }
        });

        colorInput2.addEventListener('input', (e) => {
            if (/^#[0-9A-F]{6}$/i.test(e.target.value)) {
                color2.value = e.target.value;
                updateGradient();
            }
        });

        angleInput.addEventListener('input', updateGradient);

        // Presets
        document.querySelectorAll('.angle-preset').forEach(btn => {
            btn.addEventListener('click', () => {
                angleInput.value = btn.dataset.deg;
                updateGradient();
            });
        });

        // Type toggles
        linearBtn.addEventListener('click', () => {
            gradientType = 'linear-gradient';
            directionControl.style.opacity = '1';
            directionControl.style.pointerEvents = 'auto';
            linearBtn.classList.add('bg-white', 'shadow-sm', 'text-gray-800');
            linearBtn.classList.remove('text-gray-600');
            radialBtn.classList.remove('bg-white', 'shadow-sm', 'text-gray-800');
            radialBtn.classList.add('text-gray-600');
            updateGradient();
        });

        radialBtn.addEventListener('click', () => {
            gradientType = 'radial-gradient';
            directionControl.style.opacity = '0.3';
            directionControl.style.pointerEvents = 'none';
            radialBtn.classList.add('bg-white', 'shadow-sm', 'text-gray-800');
            radialBtn.classList.remove('text-gray-600');
            linearBtn.classList.remove('bg-white', 'shadow-sm', 'text-gray-800');
            linearBtn.classList.add('text-gray-600');
            updateGradient();
        });

        // Randomize
        randomizeBtn.addEventListener('click', () => {
            const randomColor = () => '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            color1.value = randomColor();
            color2.value = randomColor();
            angleInput.value = Math.floor(Math.random() * 360);
            updateGradient();
        });

        // Copy
        copyBtn.addEventListener('click', () => {
            const textToCopy = cssCode.textContent.trim();
            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                console.error('Fallback copy failed', err);
            }
            document.body.removeChild(textArea);
        });

        function showToast() {
            toast.style.opacity = '1';
            toast.style.transform = 'translateY(0)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
            }, 2000);
        }

        // Init
        updateGradient();
    </script>
</body>
</html>
