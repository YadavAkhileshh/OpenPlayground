<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightbox · Minimal Photo Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        /* header / title */
        .gallery-header {
            max-width: 1300px;
            margin: 0 auto 2.5rem auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
        }

        .title-section h1 {
            font-weight: 600;
            font-size: 2.2rem;
            letter-spacing: -0.5px;
            background: linear-gradient(145deg, #1e293b, #3b5b8c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title-section p {
            color: #64748b;
            font-size: 1rem;
            margin-top: 0.25rem;
        }

        /* filter chips */
        .filter-bar {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .filter-chip {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            color: #334155;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
        }

        .filter-chip:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
            transform: translateY(-1px);
        }

        .filter-chip.active {
            background: #1e293b;
            color: white;
            border-color: #1e293b;
            box-shadow: 0 8px 18px -6px rgba(30,41,59,0.2);
        }

        /* masonry grid */
        .gallery-grid {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            padding: 0.5rem 0 2rem;
        }

        /* card */
        .photo-card {
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 25px -8px rgba(0,0,0,0.06), 0 2px 6px rgba(0,0,0,0.02);
            transition: all 0.25s ease;
            cursor: pointer;
            border: 1px solid rgba(203, 213, 225, 0.4);
            opacity: 1;
            transform: scale(1);
        }

        .photo-card.hidden {
            display: none;
        }

        .photo-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 36px -12px rgba(0,0,0,0.15);
            border-color: #b9c9e0;
        }

        .card-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
            background: #eef2f6;
            transition: 0.2s;
        }

        .card-info {
            padding: 1.2rem 1.2rem 1.4rem;
        }

        .card-title {
            font-weight: 600;
            font-size: 1.15rem;
            margin-bottom: 0.3rem;
            color: #0f172a;
        }

        .card-category {
            display: inline-block;
            background: #e9edf2;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            color: #3c4a5f;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }

        /* lightbox modal */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(14px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 2rem;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-content {
            max-width: 1000px;
            width: 90%;
            background: white;
            border-radius: 42px;
            box-shadow: 0 40px 70px -20px rgba(0,0,0,0.25);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #dde3ed;
            animation: lightboxIn 0.3s ease;
        }

        @keyframes lightboxIn {
            0% { opacity: 0.5; transform: scale(0.96); }
            100% { opacity: 1; transform: scale(1); }
        }

        .lightbox-image {
            width: 100%;
            max-height: 65vh;
            object-fit: contain;
            background: #f2f5f9;
        }

        .lightbox-meta {
            padding: 1.8rem 2rem;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
        }

        .lightbox-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #0b1c2e;
            margin-bottom: 0.3rem;
        }

        .lightbox-category {
            color: #4971a5;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .lightbox-description {
            margin-top: 1rem;
            color: #475569;
            line-height: 1.6;
            font-size: 1.05rem;
        }

        .close-btn {
            position: absolute;
            top: 30px;
            right: 35px;
            background: white;
            border: none;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            font-size: 2rem;
            line-height: 1;
            cursor: pointer;
            color: #2d3c53;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            transition: 0.2s;
            border: 1px solid #d9e2ef;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: #f1f5f9;
            transform: scale(1.05);
        }

        /* empty state */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            background: #f1f5f9;
            border-radius: 50px;
            color: #4b5a73;
            font-size: 1.2rem;
            border: 2px dashed #bac8dc;
        }

        /* footer */
        .footer-note {
            max-width: 1300px;
            margin: 2rem auto 0;
            text-align: center;
            color: #7e8ea8;
            font-size: 0.85rem;
            border-top: 1px solid #dde3ed;
            padding-top: 2rem;
        }

        /* loader (skeleton) – optional but adds charm */
        .skeleton {
            background: linear-gradient(90deg, #f0f3f8 25%, #f8fafc 50%, #f0f3f8 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <div class="gallery-header">
        <div class="title-section">
            <h1>Lightbox Gallery</h1>
            <p>curated collection · minimal & airy</p>
        </div>
        <div class="filter-bar" id="filterBar">
            <button class="filter-chip active" data-filter="all">All</button>
            <button class="filter-chip" data-filter="nature">Nature</button>
            <button class="filter-chip" data-filter="architecture">Architecture</button>
            <button class="filter-chip" data-filter="urban">Urban</button>
            <button class="filter-chip" data-filter="abstract">Abstract</button>
        </div>
    </div>

    <div class="gallery-grid" id="galleryGrid"></div>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <button class="close-btn" id="closeLightbox">&times;</button>
        <div class="lightbox-content">
            <img src="" alt="" class="lightbox-image" id="lightboxImg">
            <div class="lightbox-meta">
                <div class="lightbox-title" id="lightboxTitle"></div>
                <div class="lightbox-category" id="lightboxCategory"></div>
                <div class="lightbox-description" id="lightboxDesc"></div>
            </div>
        </div>
    </div>

    <div class="footer-note">
        ✦ 18 high‑resolution photos · click any card to open lightbox ✦
    </div>

    <script>
        (function() {
            // ----- PHOTO DATASET (unsplash‑style placeholders) -----
            const photos = [
                { id: 1, title: 'Misty Morning', category: 'nature', url: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&auto=format&fit=crop', description: 'Rolling hills at dawn, soft mist covering the valleys.' },
                { id: 2, title: 'Glass House', category: 'architecture', url: 'https://images.unsplash.com/photo-1487958449943-2429e8be8625?w=600&auto=format&fit=crop', description: 'Modern minimalist architecture with floor‑to‑ceiling windows.' },
                { id: 3, title: 'City Lights', category: 'urban', url: 'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=600&auto=format&fit=crop', description: 'Skyscrapers reflecting the golden hour in downtown.' },
                { id: 4, title: 'Fluid Lines', category: 'abstract', url: 'https://images.unsplash.com/photo-1541701494587-c9e79e5cfe4c?w=600&auto=format&fit=crop', description: 'Colorful abstract patterns with fluid acrylics.' },
                { id: 5, title: 'Alpine Lake', category: 'nature', url: 'https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=600&auto=format&fit=crop', description: 'Crystal clear lake surrounded by snow‑capped peaks.' },
                { id: 6, title: 'Concrete Curves', category: 'architecture', url: 'https://images.unsplash.com/photo-1518005020951-eccb494ad742?w=600&auto=format&fit=crop', description: 'Brutalist curved facade with dramatic shadows.' },
                { id: 7, title: 'Neon Rain', category: 'urban', url: 'https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=600&auto=format&fit=crop', description: 'Wet streets reflecting neon signs at night.' },
                { id: 8, title: 'Marble Swirl', category: 'abstract', url: 'https://images.unsplash.com/photo-1574169208507-84376144848b?w=600&auto=format&fit=crop', description: 'High‑contrast marble texture with gold veins.' },
                { id: 9, title: 'Redwood Giants', category: 'nature', url: 'https://images.unsplash.com/photo-1518495973542-4542c06a5843?w=600&auto=format&fit=crop', description: 'Towering redwoods in a peaceful forest.' },
                { id: 10, title: 'Brick & Steel', category: 'architecture', url: 'https://images.unsplash.com/photo-1492321936769-b49830bc1d1e?w=600&auto=format&fit=crop', description: 'Old industrial building with new steel renovations.' },
                { id: 11, title: 'Subway Steps', category: 'urban', url: 'https://images.unsplash.com/photo-1551708897-31314a082a4a?w=600&auto=format&fit=crop', description: 'Busy subway station with geometric staircases.' },
                { id: 12, title: 'Prism Light', category: 'abstract', url: 'https://images.unsplash.com/photo-1553356084-58ef4a67b2a7?w=600&auto=format&fit=crop', description: 'Light refracted through crystal prism.' },
                { id: 13, title: 'Frozen Falls', category: 'nature', url: 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=600&auto=format&fit=crop', description: 'Icy waterfall in winter landscape.' },
                { id: 14, title: 'White Columns', category: 'architecture', url: 'https://images.unsplash.com/photo-1577495508326-19a1b3cf65b7?w=600&auto=format&fit=crop', description: 'Neoclassical columns in bright daylight.' },
                { id: 15, title: 'Market Alley', category: 'urban', url: 'https://images.unsplash.com/photo-1534430480872-3498386e6f16?w=600&auto=format&fit=crop', description: 'Narrow alley with market lights.' },
                { id: 16, title: 'Ink Drops', category: 'abstract', url: 'https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=600&auto=format&fit=crop', description: 'Black ink diffusing in water.' },
                { id: 17, title: 'Desert Dune', category: 'nature', url: 'https://images.unsplash.com/photo-1509316785289-025f5b846b35?w=600&auto=format&fit=crop', description: 'Rolling sand dunes at sunset.' },
                { id: 18, title: 'Steel Bridge', category: 'architecture', url: 'https://images.unsplash.com/photo-1514924013411-cbf25faa35bb?w=600&auto=format&fit=crop', description: 'Suspension bridge cables against blue sky.' }
            ];

            // DOM elements
            const grid = document.getElementById('galleryGrid');
            const filterChips = document.querySelectorAll('.filter-chip');
            const lightbox = document.getElementById('lightbox');
            const closeBtn = document.getElementById('closeLightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            const lightboxTitle = document.getElementById('lightboxTitle');
            const lightboxCategory = document.getElementById('lightboxCategory');
            const lightboxDesc = document.getElementById('lightboxDesc');

            let activeFilter = 'all';

            // ----- RENDER GALLERY (with optional fade) -----
            function renderGallery(filter = 'all') {
                const filtered = filter === 'all' 
                    ? photos 
                    : photos.filter(p => p.category === filter);

                if (filtered.length === 0) {
                    grid.innerHTML = `<div class="no-results">✨ no images match the selected category</div>`;
                    return;
                }

                let htmlString = '';
                filtered.forEach(photo => {
                    htmlString += `
                        <div class="photo-card" data-id="${photo.id}" data-category="${photo.category}">
                            <img src="${photo.url}" alt="${photo.title}" class="card-image" loading="lazy">
                            <div class="card-info">
                                <div class="card-title">${photo.title}</div>
                                <span class="card-category">${photo.category}</span>
                            </div>
                        </div>
                    `;
                });
                grid.innerHTML = htmlString;
            }

            // initial render
            renderGallery('all');

            // ----- FILTER EVENT LISTENERS -----
            filterChips.forEach(chip => {
                chip.addEventListener('click', () => {
                    // update active class
                    filterChips.forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');

                    const filterValue = chip.getAttribute('data-filter');
                    activeFilter = filterValue;
                    renderGallery(filterValue);
                });
            });

            // ----- LIGHTBOX OPEN (delegation on grid) -----
            grid.addEventListener('click', (e) => {
                // find closest card
                const card = e.target.closest('.photo-card');
                if (!card) return;

                const photoId = parseInt(card.getAttribute('data-id'));
                const photo = photos.find(p => p.id === photoId);
                if (!photo) return;

                // populate lightbox
                lightboxImg.src = photo.url;
                lightboxImg.alt = photo.title;
                lightboxTitle.textContent = photo.title;
                lightboxCategory.textContent = `#${photo.category}`;
                lightboxDesc.textContent = photo.description;

                // show modal
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden'; // prevent background scroll
            });

            // ----- CLOSE LIGHTBOX -----
            function closeLightbox() {
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
            }

            closeBtn.addEventListener('click', closeLightbox);

            // click outside the content area to close (optional)
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) {
                    closeLightbox();
                }
            });

            // Escape key close
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                    closeLightbox();
                }
            });

            // (optional) smooth preloading effect: not necessary for demo
        })();
    </script>
</body>
</html>
