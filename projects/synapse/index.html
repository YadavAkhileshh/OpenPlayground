<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Vision: Digit Recognizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ui-layer">
        <header class="top-bar">
            <h1>🧠 Neural Vision</h1>
            <div class="stats">
                <span>Network: <span class="highlight">784 ➡️ 64 ➡️ 10</span></span>
            </div>
            <div class="controls">
                <button class="action-btn danger" onclick="app.clearCanvas()">🗑️ Clear</button>
                <button class="action-btn" onclick="app.predict()">🔍 Predict</button>
                <button class="guide-btn" onclick="app.toggleGuide()">📖 AI Manual</button>
            </div>
        </header>
    </div>

    <main class="app-container">
        <div class="canvas-container">
            <canvas id="drawCanvas" width="280" height="280"></canvas>
            
            <div class="training-lab">
                <p class="instruction" style="color: var(--accent); font-weight: bold;">TEACH THE AI:</p>
                <p class="instruction" style="margin-top: 5px;">Draw a number, then click what it is to train the network.</p>
                <div class="train-buttons" id="train-buttons">
                    </div>
            </div>
        </div>
        
        <div class="results-container">
            <h2>Prediction</h2>
            <div id="prediction-output" class="big-number">?</div>
            <div class="confidence-bars" id="confidence-bars"></div>
        </div>
    </main>

    <canvas id="hiddenCanvas" width="28" height="28" style="display:none;"></canvas>

    <script src="script.js"></script>
</body>
</html>
