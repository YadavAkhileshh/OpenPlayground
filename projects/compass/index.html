<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Digital Compass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #compass-disc {
            transition: transform 0.1s cubic-bezier(0.1, 0, 0.1, 1);
            transform-style: preserve-3d;
        }

        .degree-marker {
            position: absolute;
            width: 2px;
            background: rgba(255, 255, 255, 0.2);
            left: 50%;
            transform-origin: 0 140px;
        }

        .major-marker {
            width: 3px;
            background: rgba(255, 255, 255, 0.6);
            height: 15px;
        }

        .compass-glow {
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.15);
        }

        .needle {
            filter: drop-shadow(0 0 10px rgba(239, 68, 68, 0.5));
        }
    </style>
</head>
<body class="p-4">

    <!-- Background Decoration -->
    <div class="fixed inset-0 -z-10 opacity-20">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-600 rounded-full blur-[120px]"></div>
    </div>

    <div class="w-full max-w-md space-y-8 flex flex-col items-center">
        
        <!-- Header -->
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-800 tracking-tighter text-blue-400">COMPASS <span class="text-white text-xs align-top bg-blue-600 px-2 py-1 rounded-full">PRO</span></h1>
            <p class="text-slate-400 text-sm font-mono tracking-widest uppercase">Orientation System</p>
        </div>

        <!-- Compass Container -->
        <div class="relative w-80 h-80 flex items-center justify-center glass rounded-full compass-glow">
            
            <!-- Static Index Pointer -->
            <div class="absolute top-2 left-1/2 -translate-x-1/2 z-50 needle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2L16 10H8L12 2Z" fill="#ef4444"/>
                </svg>
            </div>

            <!-- Rotating Disc -->
            <div id="compass-disc" class="relative w-[280px] h-[280px] rounded-full flex items-center justify-center">
                <!-- Labels -->
                <span class="absolute top-4 font-bold text-2xl text-red-500">N</span>
                <span class="absolute right-4 font-bold text-xl text-slate-300">E</span>
                <span class="absolute bottom-4 font-bold text-xl text-slate-300">S</span>
                <span class="absolute left-4 font-bold text-xl text-slate-300">W</span>

                <!-- Degree Markers (Generated by JS) -->
                <div id="markers-container" class="absolute inset-0"></div>
            </div>

            <!-- Central Data Hub -->
            <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                <div class="text-5xl font-800 text-white tracking-tighter" id="heading-display">0°</div>
                <div class="text-xs font-mono text-blue-400 mt-1" id="cardinal-display">NORTH</div>
            </div>
        </div>

        <!-- Details Grid -->
        <div class="grid grid-cols-2 gap-4 w-full px-4">
            <div class="glass p-4 rounded-2xl flex flex-col items-center">
                <span class="text-[10px] text-slate-500 font-bold uppercase mb-1">Accuracy</span>
                <span class="text-lg font-mono text-blue-300" id="acc-val">High</span>
            </div>
            <div class="glass p-4 rounded-2xl flex flex-col items-center">
                <span class="text-[10px] text-slate-500 font-bold uppercase mb-1">Tilt</span>
                <span class="text-lg font-mono text-blue-300" id="tilt-val">0°</span>
            </div>
        </div>

        <!-- Permissions/Prompt -->
        <div id="permission-box" class="w-full">
            <button id="start-btn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold text-lg transition-all shadow-lg shadow-blue-900/40">
                Calibrate Sensor
            </button>
            <p class="text-[10px] text-center mt-4 text-slate-500 px-8">
                On iOS/Chrome, motion permissions are required for magnetic heading tracking.
            </p>
        </div>

    </div>

    <script>
        const disc = document.getElementById('compass-disc');
        const headingText = document.getElementById('heading-display');
        const cardinalText = document.getElementById('cardinal-display');
        const tiltText = document.getElementById('tilt-val');
        const startBtn = document.getElementById('start-btn');
        const permissionBox = document.getElementById('permission-box');
        const markersContainer = document.getElementById('markers-container');

        // Initialize markers
        function createMarkers() {
            for (let i = 0; i < 360; i += 5) {
                const marker = document.createElement('div');
                marker.className = 'degree-marker';
                if (i % 30 === 0) {
                    marker.classList.add('major-marker');
                    marker.style.height = '12px';
                } else {
                    marker.style.height = '6px';
                }
                marker.style.transform = `rotate(${i}deg)`;
                markersContainer.appendChild(marker);
            }
        }

        createMarkers();

        const getCardinal = (angle) => {
            const directions = ['NORTH', 'NE', 'EAST', 'SE', 'SOUTH', 'SW', 'WEST', 'NW', 'NORTH'];
            return directions[Math.round(angle / 45)];
        };

        function handleOrientation(event) {
            let heading = 0;

            // Check for webkitCompassHeading (iOS)
            if (event.webkitCompassHeading) {
                heading = event.webkitCompassHeading;
            } else {
                // Calculation for non-iOS devices
                heading = 360 - event.alpha;
            }

            if (heading === undefined || heading === null) return;

            // Rotation logic
            const rotation = 360 - heading;
            disc.style.transform = `rotate(${rotation}deg)`;
            
            // UI Updates
            headingText.innerText = `${Math.round(heading)}°`;
            cardinalText.innerText = getCardinal(heading);
            
            // Calculate Tilt (Gamma/Beta)
            const tilt = Math.max(Math.abs(event.beta), Math.abs(event.gamma));
            tiltText.innerText = `${Math.round(tilt)}°`;
        }

        async function initCompass() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        activateListeners();
                    } else {
                        alert('Permission denied. Please enable motion access.');
                    }
                } catch (e) {
                    console.error(e);
                }
            } else {
                activateListeners();
            }
        }

        function activateListeners() {
            window.addEventListener('deviceorientation', handleOrientation, true);
            permissionBox.style.display = 'none';
        }

        startBtn.addEventListener('click', initCompass);

        // Debug/Fallback for desktop testing
        if (!window.DeviceOrientationEvent) {
            headingText.innerText = "N/A";
            cardinalText.innerText = "NO SENSOR";
        }
    </script>
</body>
</html>
