<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotionLab - Advanced UI Kit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-dark: #050505;
            --accent: #3d5afe;
            --accent-glow: rgba(61, 90, 254, 0.4);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            overflow-x: hidden;
        }

        /* --- THE ANIMATION ENGINE --- */

        /* 1. Glass Morph Entrance */
        @keyframes glassReveal {
            0% { opacity: 0; backdrop-filter: blur(0px); transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; backdrop-filter: blur(12px); transform: translateY(0) scale(1); }
        }

        /* 2. Neon Pulse Border */
        @keyframes neonPulse {
            0%, 100% { border-color: var(--accent); box-shadow: 0 0 5px var(--accent-glow); }
            50% { border-color: #ff00c8; box-shadow: 0 0 20px rgba(255, 0, 200, 0.5); }
        }

        /* 3. Floating 3D */
        @keyframes float3D {
            0%, 100% { transform: perspective(1000px) rotateY(0deg) translateY(0); }
            50% { transform: perspective(1000px) rotateY(15deg) translateY(-20px); }
        }

        /* 4. Text Liquid Shine */
        @keyframes liquidShine {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        /* 5. Magnetic Hover (Logic in JS) */
        
        /* 6. Tilt & Shift (Perspective) */
        .tilt-card {
            transition: transform 0.2s ease-out;
            transform-style: preserve-3d;
        }

        /* Utility Classes */
        .anim-glass { animation: glassReveal 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .anim-neon { animation: neonPulse 3s infinite; border: 2px solid transparent; }
        .anim-float { animation: float3D 5s ease-in-out infinite; }
        
        .liquid-text {
            background: linear-gradient(90deg, #3d5afe, #ff00c8, #3d5afe);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: liquidShine 3s linear infinite;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .code-block {
            background: #111;
            font-family: monospace;
            font-size: 11px;
            color: #888;
        }

        /* Grid Background */
        .grid-bg {
            background-image: linear-gradient(rgba(61, 90, 254, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(61, 90, 254, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="grid-bg min-h-screen">

    <!-- Header -->
    <nav class="p-6 flex justify-between items-center border-b border-white/5 bg-black/50 backdrop-blur-xl sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-accent rounded-full flex items-center justify-center anim-neon">
                <i class="fa-solid fa-atom text-white"></i>
            </div>
            <span class="text-xl font-bold tracking-widest uppercase">Motion<span class="text-accent">Lab</span></span>
        </div>
        <div class="flex gap-6 text-xs font-medium uppercase tracking-widest text-white/50">
            <a href="#" class="hover:text-accent transition">Keyframes</a>
            <a href="#" class="hover:text-accent transition">Physics</a>
            <a href="#" class="hover:text-accent transition">3D Effects</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Sidebar: Library -->
        <div class="lg:col-span-3 space-y-6">
            <h2 class="text-sm font-bold text-white/30 uppercase tracking-widest">Component Library</h2>
            <div class="space-y-4">
                <button onclick="setStage('glass')" class="w-full p-4 glass-panel rounded-xl text-left hover:bg-white/10 transition group flex justify-between items-center">
                    <span>Glass Reveal</span>
                    <i class="fa-solid fa-chevron-right text-[10px] group-hover:translate-x-1 transition"></i>
                </button>
                <button onclick="setStage('neon')" class="w-full p-4 glass-panel rounded-xl text-left hover:bg-white/10 transition group flex justify-between items-center">
                    <span>Neon Pulse</span>
                    <i class="fa-solid fa-chevron-right text-[10px] group-hover:translate-x-1 transition"></i>
                </button>
                <button onclick="setStage('float')" class="w-full p-4 glass-panel rounded-xl text-left hover:bg-white/10 transition group flex justify-between items-center">
                    <span>3D Floating</span>
                    <i class="fa-solid fa-chevron-right text-[10px] group-hover:translate-x-1 transition"></i>
                </button>
                <button onclick="setStage('liquid')" class="w-full p-4 glass-panel rounded-xl text-left hover:bg-white/10 transition group flex justify-between items-center">
                    <span>Liquid Text</span>
                    <i class="fa-solid fa-chevron-right text-[10px] group-hover:translate-x-1 transition"></i>
                </button>
            </div>
        </div>

        <!-- Main Stage -->
        <div class="lg:col-span-6 flex flex-col gap-6">
            <div id="stage" class="h-[400px] glass-panel rounded-[2rem] flex items-center justify-center relative overflow-hidden group">
                <!-- Live Preview Item -->
                <div id="preview-item" class="w-48 h-48 bg-accent rounded-3xl flex items-center justify-center text-5xl shadow-2xl">
                    <i class="fa-solid fa-ghost"></i>
                </div>
                
                <!-- Overlay hint -->
                <div class="absolute bottom-6 text-[10px] text-white/20 uppercase tracking-[0.2em]">Live Interaction Stage</div>
            </div>

            <div class="glass-panel p-6 rounded-2xl space-y-4">
                <div class="flex justify-between items-center">
                    <h3 class="font-bold text-sm uppercase text-accent">Source Code</h3>
                    <button onclick="copyCode()" class="text-[10px] bg-white/5 px-3 py-1 rounded-full hover:bg-accent transition uppercase font-bold">Copy Class</button>
                </div>
                <div id="code-output" class="code-block p-4 rounded-xl break-all">
                    .anim-glass { animation: glassReveal 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
                </div>
            </div>
        </div>

        <!-- Right Panel: Tweak Params -->
        <div class="lg:col-span-3 space-y-6">
             <h2 class="text-sm font-bold text-white/30 uppercase tracking-widest">Animation Specs</h2>
             
             <div class="glass-panel p-6 rounded-2xl space-y-6">
                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-white/50 uppercase">Duration</label>
                    <input type="range" class="w-full accent-accent" min="0.1" max="5" step="0.1">
                    <div class="flex justify-between text-[10px] text-white/30">
                        <span>0.1s</span>
                        <span>5.0s</span>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-white/50 uppercase">Intensity</label>
                    <input type="range" class="w-full accent-accent" min="1" max="100">
                </div>

                <div class="pt-4 border-t border-white/5">
                    <button onclick="triggerReset()" class="w-full py-3 bg-white text-black text-xs font-bold rounded-xl hover:bg-accent hover:text-white transition uppercase tracking-widest">
                        Replay Animation
                    </button>
                </div>
             </div>

             <div class="glass-panel p-4 rounded-2xl flex items-center gap-3">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                <span class="text-[10px] text-white/40 uppercase font-medium">GPU Acceleration Enabled</span>
             </div>
        </div>

    </main>

    <!-- Footer Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-3 glass-panel rounded-full border-accent/50 text-xs font-bold tracking-widest opacity-0 transition-all">
        CODE COPIED TO CLIPBOARD
    </div>

    <script>
        const preview = document.getElementById('preview-item');
        const codeOut = document.getElementById('code-output');
        let currentMode = 'glass';

        const config = {
            glass: {
                class: 'anim-glass',
                icon: 'fa-ghost',
                code: '.anim-glass { animation: glassReveal 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }',
                color: '#3d5afe'
            },
            neon: {
                class: 'anim-neon',
                icon: 'fa-bolt',
                code: '@keyframes neonPulse { 0%, 100% { border-color: var(--accent); } 50% { border-color: #ff00c8; } }',
                color: '#111'
            },
            float: {
                class: 'anim-float',
                icon: 'fa-rocket',
                code: '.anim-float { animation: float3D 5s ease-in-out infinite; }',
                color: '#8b5cf6'
            },
            liquid: {
                class: 'liquid-text',
                icon: 'fa-droplet',
                code: '.liquid-text { background-size: 200%; animation: liquidShine 3s linear infinite; }',
                color: 'transparent'
            }
        };

        function setStage(mode) {
            currentMode = mode;
            const data = config[mode];
            
            // Clear animations
            preview.className = 'w-48 h-48 rounded-3xl flex items-center justify-center text-5xl transition-all duration-500 shadow-2xl';
            
            // Reflow to restart animation
            void preview.offsetWidth;
            
            // Apply new state
            preview.classList.add(data.class);
            preview.innerHTML = `<i class="fa-solid ${data.icon}"></i>`;
            preview.style.backgroundColor = data.color;
            
            if(mode === 'liquid') {
                preview.classList.add('text-white');
                preview.style.backgroundColor = '#111';
                preview.innerHTML = `<span class="text-4xl font-black uppercase tracking-tighter liquid-text">FLOW</span>`;
            }

            codeOut.innerText = data.code;
        }

        function triggerReset() {
            setStage(currentMode);
        }

        function copyCode() {
            const text = codeOut.innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => toast.classList.add('opacity-0', 'translate-y-4'), 2000);
        }

        // Mouse Tilt Effect for Stage
        const stage = document.getElementById('stage');
        stage.addEventListener('mousemove', (e) => {
            const rect = stage.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const rotateX = (y - centerY) / 20;
            const rotateY = (centerX - x) / 20;
            
            preview.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        stage.addEventListener('mouseleave', () => {
            preview.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
        });

        // Init
        setStage('glass');
    </script>
</body>
</html>
