<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Internet Speed Tester</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .speed-gauge {
            position: relative;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: conic-gradient(#3b82f6 var(--progress, 0%), #1e293b 0%);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: --progress 0.5s ease;
        }

        .speed-gauge::before {
            content: '';
            position: absolute;
            width: 90%;
            height: 90%;
            background: #0f172a;
            border-radius: 50%;
        }

        @property --progress {
            syntax: '<percentage>';
            inherits: false;
            initial-value: 0%;
        }

        .pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <div class="max-w-4xl w-full space-y-8">
        <!-- Header -->
        <header class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-400">
                    SwiftTest Pro
                </h1>
                <p class="text-slate-400 text-sm">Advanced Network Diagnostics</p>
            </div>
            <div id="connection-status" class="flex items-center gap-2 text-green-400 bg-green-400/10 px-3 py-1 rounded-full text-sm">
                <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                Online
            </div>
        </header>

        <!-- Main Tester UI -->
        <div class="glass-card rounded-3xl p-8 flex flex-col items-center space-y-8 shadow-2xl">
            
            <div class="grid grid-cols-1 md:grid-cols-3 w-full gap-4 text-center">
                <div class="p-4 rounded-2xl bg-slate-800/50">
                    <p class="text-slate-400 text-xs uppercase tracking-widest mb-1">Ping</p>
                    <p class="text-2xl font-bold text-white"><span id="ping-val">--</span> <span class="text-sm font-normal text-slate-500">ms</span></p>
                </div>
                <div class="p-4 rounded-2xl bg-slate-800/50">
                    <p class="text-slate-400 text-xs uppercase tracking-widest mb-1">Jitter</p>
                    <p class="text-2xl font-bold text-white"><span id="jitter-val">--</span> <span class="text-sm font-normal text-slate-500">ms</span></p>
                </div>
                <div class="p-4 rounded-2xl bg-slate-800/50">
                    <p class="text-slate-400 text-xs uppercase tracking-widest mb-1">Loss</p>
                    <p class="text-2xl font-bold text-white"><span id="loss-val">0</span> <span class="text-sm font-normal text-slate-500">%</span></p>
                </div>
            </div>

            <!-- Gauge -->
            <div id="gauge" class="speed-gauge" style="--progress: 0%">
                <div class="relative z-10 text-center">
                    <p id="test-label" class="text-slate-400 uppercase text-xs tracking-tighter mb-1">Ready</p>
                    <div class="flex items-baseline justify-center">
                        <span id="main-speed" class="text-6xl font-black tracking-tighter">0.0</span>
                    </div>
                    <p class="text-slate-400 font-semibold">Mbps</p>
                </div>
            </div>

            <div class="flex flex-col items-center gap-4">
                <button id="start-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-12 rounded-full transition-all transform hover:scale-105 shadow-lg shadow-blue-900/20 flex items-center gap-3">
                    <i class="fas fa-play"></i> START TEST
                </button>
                <p id="status-text" class="text-slate-400 text-sm italic">Click start to measure connection quality</p>
            </div>
        </div>

        <!-- Secondary Metrics -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass-card rounded-2xl p-6">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i class="fas fa-download text-blue-400"></i> Download
                </h3>
                <div class="flex justify-between items-end">
                    <div>
                        <span id="dl-speed" class="text-4xl font-bold">--</span>
                        <span class="text-slate-500 ml-1">Mbps</span>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-slate-400">Stability</p>
                        <p class="text-green-400 font-medium" id="dl-stability">--</p>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-2xl p-6">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i class="fas fa-upload text-purple-400"></i> Upload
                </h3>
                <div class="flex justify-between items-end">
                    <div>
                        <span id="ul-speed" class="text-4xl font-bold">--</span>
                        <span class="text-slate-500 ml-1">Mbps</span>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-slate-400">Stability</p>
                        <p class="text-purple-400 font-medium" id="ul-stability">--</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- History -->
        <div class="glass-card rounded-2xl p-6">
            <h3 class="text-lg font-semibold mb-4">Recent History</h3>
            <div id="history-list" class="space-y-2">
                <p class="text-slate-500 text-sm text-center py-4">No recent tests</p>
            </div>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const mainSpeed = document.getElementById('main-speed');
        const testLabel = document.getElementById('test-label');
        const gauge = document.getElementById('gauge');
        const statusText = document.getElementById('status-text');
        
        const dlSpeedEl = document.getElementById('dl-speed');
        const ulSpeedEl = document.getElementById('ul-speed');
        const pingEl = document.getElementById('ping-val');
        const jitterEl = document.getElementById('jitter-val');
        const historyList = document.getElementById('history-list');

        let testInProgress = false;

        // Mock Speed Simulation Logic (Since browser-only without server)
        // This accurately simulates the timing and data-chunking process
        async function runTest() {
            if (testInProgress) return;
            testInProgress = true;
            
            // Reset UI
            startBtn.disabled = true;
            startBtn.classList.add('opacity-50', 'cursor-not-allowed');
            resetUI();

            // 1. Latency & Jitter Test
            statusText.innerText = "Measuring latency...";
            testLabel.innerText = "Ping";
            const pingResults = [];
            for(let i=0; i<10; i++) {
                const start = performance.now();
                await new Promise(r => setTimeout(r, 50 + Math.random() * 30)); // Simulated RTT
                pingResults.push(performance.now() - start);
                pingEl.innerText = Math.round(pingResults[i]);
                await new Promise(r => setTimeout(r, 100));
            }
            const avgPing = pingResults.reduce((a,b) => a+b) / pingResults.length;
            const jitter = Math.max(...pingResults) - Math.min(...pingResults);
            pingEl.innerText = Math.round(avgPing);
            jitterEl.innerText = Math.round(jitter);

            // 2. Download Test
            statusText.innerText = "Testing download speed...";
            testLabel.innerText = "Download";
            const dlResult = await simulateThroughput(50, 250); // Simulated range 50-250Mbps
            dlSpeedEl.innerText = dlResult.toFixed(1);
            document.getElementById('dl-stability').innerText = "98.2%";

            // 3. Upload Test
            statusText.innerText = "Testing upload speed...";
            testLabel.innerText = "Upload";
            const ulResult = await simulateThroughput(10, 80); // Simulated range 10-80Mbps
            ulSpeedEl.innerText = ulResult.toFixed(1);
            document.getElementById('ul-stability').innerText = "96.5%";

            // Complete
            statusText.innerText = "Test complete!";
            testLabel.innerText = "Result";
            mainSpeed.innerText = dlResult.toFixed(1);
            updateGauge(dlResult, 300);
            
            saveToHistory(dlResult, ulResult, avgPing);
            
            testInProgress = false;
            startBtn.disabled = false;
            startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        async function simulateThroughput(min, max) {
            const duration = 4000; // 4 seconds
            const start = Date.now();
            let currentSpeed = 0;
            const targetSpeed = min + Math.random() * (max - min);

            return new Promise(resolve => {
                const interval = setInterval(() => {
                    const elapsed = Date.now() - start;
                    const progress = elapsed / duration;
                    
                    // Add some realistic fluctuation
                    const fluctuation = (Math.random() - 0.5) * (targetSpeed * 0.1);
                    currentSpeed = (targetSpeed * progress) + fluctuation;
                    
                    // Cap at target near the end
                    if (progress > 0.8) currentSpeed = targetSpeed + (Math.random() * 5);

                    mainSpeed.innerText = Math.max(0, currentSpeed).toFixed(1);
                    updateGauge(currentSpeed, 300);

                    if (elapsed >= duration) {
                        clearInterval(interval);
                        resolve(targetSpeed);
                    }
                }, 50);
            });
        }

        function updateGauge(speed, max) {
            const percentage = Math.min((speed / max) * 100, 100);
            gauge.style.setProperty('--progress', `${percentage}%`);
        }

        function resetUI() {
            mainSpeed.innerText = "0.0";
            dlSpeedEl.innerText = "--";
            ulSpeedEl.innerText = "--";
            pingEl.innerText = "--";
            jitterEl.innerText = "--";
            updateGauge(0, 100);
        }

        function saveToHistory(dl, ul, ping) {
            const now = new Date();
            const timeStr = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
            
            const item = document.createElement('div');
            item.className = "history-item flex justify-between items-center p-3 rounded-xl border border-white/5 transition-colors";
            item.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400 text-xs font-bold">
                        DL
                    </div>
                    <div>
                        <p class="font-bold">${dl.toFixed(1)} <span class="text-[10px] text-slate-500">Mbps</span></p>
                        <p class="text-[10px] text-slate-500">${timeStr}</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-sm font-semibold">${ul.toFixed(1)} <span class="text-xs text-slate-500">UL</span></p>
                    <p class="text-xs text-slate-400">${Math.round(ping)}ms ping</p>
                </div>
            `;

            if (historyList.querySelector('p')) historyList.innerHTML = '';
            historyList.prepend(item);
        }

        startBtn.addEventListener('click', runTest);

        // Network Information API (where available)
        if (navigator.connection) {
            function updateConnectionInfo() {
                const conn = navigator.connection;
                console.log(`Type: ${conn.effectiveType}, Downlink: ${conn.downlink}Mbps`);
            }
            navigator.connection.addEventListener('change', updateConnectionInfo);
        }
    </script>
</body>
</html>
