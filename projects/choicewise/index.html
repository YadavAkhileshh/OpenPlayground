<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChoiceWise · Decision Maker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f0f4f8;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            color: #1e3b4f;
        }

        .decision-card {
            max-width: 800px;
            width: 100%;
            background: #ffffff;
            border-radius: 70px;
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.2), 0 0 0 2px #d0e2f0 inset;
            padding: 2.5rem 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            border-bottom: 2px solid #d0e2f0;
            padding-bottom: 1.2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .title h1 {
            font-size: 2.5rem;
            font-weight: 400;
            background: linear-gradient(145deg, #2e5a7a, #558bb5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title p {
            color: #5d7e9c;
            margin-top: 0.2rem;
        }

        .question-area {
            background: #f8fcff;
            border-radius: 50px;
            padding: 2rem;
            border: 2px solid #d0e2f0;
            margin-bottom: 2rem;
            text-align: center;
        }

        .question-input {
            width: 100%;
            padding: 1.2rem 1.8rem;
            font-size: 1.2rem;
            border: 3px solid #c1d9f0;
            border-radius: 60px;
            outline: none;
            margin-bottom: 1rem;
            background: white;
        }

        .question-input:focus {
            border-color: #7fa9cc;
        }

        .primary-btn {
            background: #2f6d97;
            border: none;
            border-radius: 60px;
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.1s;
            border: 2px solid #2f6d97;
            margin: 0.5rem;
        }

        .primary-btn:hover {
            background: #1e567b;
        }

        .secondary-btn {
            background: #e6f0fa;
            border: 3px solid #c1d9f0;
            border-radius: 60px;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            color: #2b6286;
            cursor: pointer;
        }

        /* options grid */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin: 2rem 0;
        }

        .option-column {
            background: #f8fcff;
            border-radius: 40px;
            padding: 1.5rem;
            border: 2px solid #d0e2f0;
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            font-size: 1.3rem;
            font-weight: 600;
            color: #1d4a6b;
        }

        .pro-header { color: #2a7f5a; }
        .con-header { color: #b13e3e; }

        .item-list {
            min-height: 150px;
            margin-bottom: 1rem;
        }

        .list-item {
            background: white;
            border: 2px solid #c1d9f0;
            border-radius: 50px;
            padding: 0.8rem 1.2rem;
            margin-bottom: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-text {
            font-size: 1rem;
            color: #1e3b4f;
        }

        .item-weight {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .weight-value {
            font-weight: 600;
            color: #2b6286;
            min-width: 2.5rem;
        }

        .weight-slider {
            width: 80px;
        }

        .delete-item {
            background: none;
            border: none;
            color: #9fb5cf;
            font-size: 1.2rem;
            cursor: pointer;
            margin-left: 0.5rem;
        }

        .add-item {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .add-item input {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border: 3px solid #c1d9f0;
            border-radius: 60px;
            outline: none;
        }

        .add-item button {
            background: #e6f0fa;
            border: 3px solid #c1d9f0;
            border-radius: 60px;
            padding: 0 1.5rem;
            font-weight: 600;
            color: #2b6286;
            cursor: pointer;
        }

        /* result panel */
        .result-panel {
            background: #f0f7ff;
            border-radius: 40px;
            padding: 1.5rem;
            border: 2px solid #d0e2f0;
            margin: 2rem 0;
            text-align: center;
        }

        .result-score {
            font-size: 3rem;
            font-weight: 600;
            color: #1d4a6b;
        }

        .result-label {
            font-size: 1.2rem;
            color: #5d7e9c;
            margin: 0.5rem 0;
        }

        .result-recommendation {
            font-size: 1.5rem;
            font-weight: 500;
            padding: 1rem;
            border-radius: 60px;
        }

        .recommend-pro {
            background: #e2f7e9;
            color: #2a7f5a;
        }

        .recommend-con {
            background: #ffe2e2;
            color: #b13e3e;
        }

        .recommend-neutral {
            background: #e6f0fa;
            color: #2b6286;
        }

        .footer {
            text-align: center;
            color: #9bb7d4;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="decision-card">
        <div class="header">
            <div class="title">
                <h1>⚖️ ChoiceWise</h1>
                <p>pros & cons · weighted decisions</p>
            </div>
        </div>

        <!-- question area -->
        <div class="question-area">
            <input type="text" class="question-input" id="questionInput" placeholder="What's your decision? (e.g., Buy a car?)" value="Should I travel?">
            <button class="primary-btn" id="setQuestionBtn">set question</button>
        </div>

        <!-- pros and cons columns -->
        <div class="options-grid">
            <!-- pros column -->
            <div class="option-column">
                <div class="column-header pro-header">✅ PROS</div>
                <div class="item-list" id="proList"></div>
                <div class="add-item">
                    <input type="text" id="proInput" placeholder="Add pro...">
                    <button id="addProBtn">+</button>
                </div>
            </div>

            <!-- cons column -->
            <div class="option-column">
                <div class="column-header con-header">❌ CONS</div>
                <div class="item-list" id="conList"></div>
                <div class="add-item">
                    <input type="text" id="conInput" placeholder="Add con...">
                    <button id="addConBtn">+</button>
                </div>
            </div>
        </div>

        <!-- result panel -->
        <div class="result-panel">
            <div class="result-score" id="scoreDisplay">0</div>
            <div class="result-label">weighted score</div>
            <div class="result-recommendation" id="recommendation">neutral</div>
        </div>

        <!-- reset button -->
        <div style="text-align: center;">
            <button class="secondary-btn" id="resetBtn">reset all</button>
        </div>

        <div class="footer">
            ⚡ adjust importance sliders · decide with clarity
        </div>
    </div>

    <script>
        (function() {
            // state
            let question = "Should I travel?";
            let pros = [
                { text: "New experiences", weight: 5 },
                { text: "Meet people", weight: 3 }
            ];
            let cons = [
                { text: "Cost", weight: 4 },
                { text: "Time off work", weight: 3 }
            ];

            // DOM elements
            const questionInput = document.getElementById('questionInput');
            const setQuestionBtn = document.getElementById('setQuestionBtn');
            const proList = document.getElementById('proList');
            const conList = document.getElementById('conList');
            const proInput = document.getElementById('proInput');
            const conInput = document.getElementById('conInput');
            const addProBtn = document.getElementById('addProBtn');
            const addConBtn = document.getElementById('addConBtn');
            const resetBtn = document.getElementById('resetBtn');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const recommendation = document.getElementById('recommendation');

            // render lists
            function renderLists() {
                // pros
                let proHtml = '';
                pros.forEach((item, index) => {
                    proHtml += `
                        <div class="list-item">
                            <span class="item-text">${item.text}</span>
                            <div class="item-weight">
                                <span class="weight-value">${item.weight}</span>
                                <input type="range" class="weight-slider" data-type="pro" data-index="${index}" min="0" max="10" step="1" value="${item.weight}">
                                <button class="delete-item" data-type="pro" data-index="${index}">✕</button>
                            </div>
                        </div>
                    `;
                });
                proList.innerHTML = proHtml;

                // cons
                let conHtml = '';
                cons.forEach((item, index) => {
                    conHtml += `
                        <div class="list-item">
                            <span class="item-text">${item.text}</span>
                            <div class="item-weight">
                                <span class="weight-value">${item.weight}</span>
                                <input type="range" class="weight-slider" data-type="con" data-index="${index}" min="0" max="10" step="1" value="${item.weight}">
                                <button class="delete-item" data-type="con" data-index="${index}">✕</button>
                            </div>
                        </div>
                    `;
                });
                conList.innerHTML = conHtml;

                // attach event listeners
                document.querySelectorAll('.weight-slider').forEach(slider => {
                    slider.addEventListener('input', (e) => {
                        const type = slider.getAttribute('data-type');
                        const idx = slider.getAttribute('data-index');
                        const val = parseInt(slider.value);
                        if (type === 'pro') {
                            pros[idx].weight = val;
                        } else {
                            cons[idx].weight = val;
                        }
                        updateScore();
                        renderLists(); // re-render to update displayed value
                    });
                });

                document.querySelectorAll('.delete-item').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const type = btn.getAttribute('data-type');
                        const idx = btn.getAttribute('data-index');
                        if (type === 'pro') {
                            pros.splice(idx, 1);
                        } else {
                            cons.splice(idx, 1);
                        }
                        updateScore();
                        renderLists();
                    });
                });

                updateScore();
            }

            // calculate weighted score
            function updateScore() {
                const proSum = pros.reduce((sum, item) => sum + item.weight, 0);
                const conSum = cons.reduce((sum, item) => sum + item.weight, 0);
                const total = proSum - conSum;
                scoreDisplay.innerText = total;

                if (total > 0) {
                    recommendation.innerText = '✅ go for it!';
                    recommendation.className = 'result-recommendation recommend-pro';
                } else if (total < 0) {
                    recommendation.innerText = '❌ better not';
                    recommendation.className = 'result-recommendation recommend-con';
                } else {
                    recommendation.innerText = '⚖️ weigh again';
                    recommendation.className = 'result-recommendation recommend-neutral';
                }
            }

            // add pro
            addProBtn.addEventListener('click', () => {
                const text = proInput.value.trim();
                if (text) {
                    pros.push({ text, weight: 5 });
                    proInput.value = '';
                    renderLists();
                }
            });

            // add con
            addConBtn.addEventListener('click', () => {
                const text = conInput.value.trim();
                if (text) {
                    cons.push({ text, weight: 5 });
                    conInput.value = '';
                    renderLists();
                }
            });

            // set question
            setQuestionBtn.addEventListener('click', () => {
                const q = questionInput.value.trim();
                if (q) {
                    question = q;
                    // optionally update header
                }
            });

            // reset
            resetBtn.addEventListener('click', () => {
                pros = [];
                cons = [];
                questionInput.value = '';
                renderLists();
            });

            // initial render
            renderLists();

            // allow enter key in inputs
            proInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addProBtn.click();
            });
            conInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addConBtn.click();
            });
        })();
    </script>
</body>
</html>
