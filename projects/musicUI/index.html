<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music Player</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="player">

<h1>🎧 Music Player</h1>

<img src="cover.jpg" class="cover">

<h2 id="title">Select a Song</h2>

<audio id="audio"></audio>

<div class="controls">
<button onclick="prevSong()">⏮</button>
<button onclick="playSong()">▶️</button>
<button onclick="pauseSong()">⏸</button>
<button onclick="nextSong()">⏭</button>
</div>

<input type="range" id="progress" value="0">

<h3>Playlist</h3>

<ul id="playlist">
<li onclick="loadSong(0)">Song 1</li>
<li onclick="loadSong(1)">Song 2</li>
<li onclick="loadSong(2)">Song 3</li>
</ul>

</div>

<script src="script.js"></script>

</body>
</html>
