<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Water Boiler Alarm</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <h1>🔥 Water Boiler</h1>
        <p class="sub">Alarm System</p>
        <div class="boiler-wrap">
            <div class="steams">
                <div class="s" id="s1"></div>
                <div class="s" id="s2"></div>
                <div class="s" id="s3"></div>
            </div>
            <div class="boiler">
                <div class="shine"></div>
                <div id="water" style="height:30%"></div>
            </div>
        </div>
        <div class="row">
            <span class="lbl">Temperature</span>
            <div class="big"><span id="tv">20</span><sup>°C</sup></div>
        </div>
        <div class="track">
            <div id="bar" style="width:0%"></div>
        </div>
        <div class="thresh">
            <div class="row" style="margin-bottom:10px">
                <span class="lbl">⚠️ Alarm Threshold</span>
                <span class="tval" id="td">80°C</span>
            </div>
            <input type="range" id="sl" min="40" max="100" value="80" />
        </div>
        <div class="btns">
            <button class="btn bs" id="btnS">▶ Start Heating</button>
            <button class="btn bx" id="btnX" disabled>■ Stop</button>
        </div>
        <div class="sbar">
            <div class="dot" id="dot"></div>
            <span class="stxt" id="st">Idle — ready to heat</span>
        </div>
        <div class="abanner" id="ab">
            <span>🔔</span>
            <span class="at">TARGET REACHED! BOILING ALARM!</span>
            <button class="bm" id="bm">MUTE</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
