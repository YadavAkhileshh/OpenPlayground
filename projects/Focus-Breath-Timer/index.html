<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Focus Breath Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<canvas id="stars"></canvas>
<div class="wrapper">
  <div class="title">Breathe</div>
  <div class="tagline">Focus breath timer</div>
  <div class="orb-wrap">
    <svg class="arc-svg" viewBox="0 0 220 220">
      <circle class="arc-track" cx="110" cy="110" r="105"/>
      <circle class="arc-prog" id="arc" cx="110" cy="110" r="105"/>
    </svg>
    <div class="orb-ring"></div>
    <div class="orb" id="orb">
      <div class="orb-inner"></div>
      <div class="phase-text" id="phase-text">Ready</div>
    </div>
  </div>
  <div class="session-info">
    Cycle <span id="cycle-num">0</span> &nbsp;·&nbsp; <span id="total-time">0:00</span> elapsed
  </div>
  <div class="patterns">
    <button class="pat-btn active" onclick="selectPattern(this,'478')">4-7-8</button>
    <button class="pat-btn" onclick="selectPattern(this,'box')">Box</button>
    <button class="pat-btn" onclick="selectPattern(this,'calm')">Calm</button>
    <button class="pat-btn" onclick="selectPattern(this,'energize')">Energize</button>
    <button class="pat-btn" onclick="selectPattern(this,'custom')">Custom</button>
  </div>
  <div class="custom-wrap" id="custom-wrap">
    <div class="slider-row">
      <span class="slider-label">Inhale</span>
      <input type="range" id="s-inhale" min="2" max="10" value="4" oninput="updateCustom()"/>
      <span class="slider-val" id="v-inhale">4</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Hold in</span>
      <input type="range" id="s-holdin" min="0" max="10" value="4" oninput="updateCustom()"/>
      <span class="slider-val" id="v-holdin">4</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Exhale</span>
      <input type="range" id="s-exhale" min="2" max="12" value="4" oninput="updateCustom()"/>
      <span class="slider-val" id="v-exhale">4</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Hold out</span>
      <input type="range" id="s-holdout" min="0" max="10" value="4" oninput="updateCustom()"/>
      <span class="slider-val" id="v-holdout">4</span>
    </div>
  </div>
  <div class="controls">
    <button class="btn-main" id="btn-start" onclick="toggleSession()">Start</button>
    <button class="btn-reset" onclick="resetSession()">Reset</button>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
