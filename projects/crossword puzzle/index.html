<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossword Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(10, minmax(0, 1fr));
            gap: 1px;
            background-color: #334155;
            border: 2px solid #334155;
            width: fit-content;
        }
        .cell {
            aspect-ratio: 1 / 1;
            width: 40px;
            background-color: white;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.25rem;
            cursor: pointer;
            text-transform: uppercase;
            user-select: none;
            transition: all 0.15s ease;
        }
        .cell.black {
            background-color: #1e293b;
            cursor: default;
        }
        .cell.selected {
            background-color: #fef08a !important;
        }
        .cell.highlighted {
            background-color: #e0f2fe;
        }
        .cell-number {
            position: absolute;
            top: 2px;
            left: 2px;
            font-size: 0.65rem;
            color: #64748b;
            line-height: 1;
        }
        .cell.correct {
            color: #16a34a;
        }
        .cell.incorrect {
            color: #dc2626;
            background-color: #fee2e2;
        }
        @media (max-width: 640px) {
            .cell { width: 32px; font-size: 1rem; }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900">Crossword Challenge</h1>
                <p class="text-slate-500">Theme: General Knowledge</p>
            </div>
            <div class="flex gap-2">
                <button onclick="checkPuzzle()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 transition">Check</button>
                <button onclick="revealWord()" class="px-4 py-2 bg-slate-200 text-slate-700 rounded-lg font-semibold hover:bg-slate-300 transition">Reveal Word</button>
                <button onclick="resetGame()" class="px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-lg font-semibold hover:bg-slate-50 transition">Reset</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Game Board -->
            <div class="lg:col-span-7 flex flex-col items-center">
                <div id="grid" class="grid-container shadow-2xl rounded overflow-hidden">
                    <!-- Grid generated by JS -->
                </div>
                
                <!-- Active Clue Display (Mobile Friendly) -->
                <div id="active-clue-bar" class="mt-6 w-full p-4 bg-indigo-50 border-l-4 border-indigo-500 rounded text-indigo-900 font-medium">
                    Select a square to start
                </div>

                <!-- Virtual Keyboard for Mobile -->
                <div class="mt-6 grid grid-cols-10 gap-1 w-full md:hidden">
                    <!-- JS will inject keys if needed, but standard input works best -->
                </div>
            </div>

            <!-- Clues Side -->
            <div class="lg:col-span-5 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-1 gap-6">
                <!-- Across -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span class="w-2 h-6 bg-emerald-500 rounded-full"></span>
                        Across
                    </h2>
                    <ul id="across-clues" class="space-y-3 text-slate-700"></ul>
                </div>

                <!-- Down -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span class="w-2 h-6 bg-blue-500 rounded-full"></span>
                        Down
                    </h2>
                    <ul id="down-clues" class="space-y-3 text-slate-700"></ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Feedback Message -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-slate-900 text-white rounded-full opacity-0 transition-opacity pointer-events-none shadow-xl">
        Message here
    </div>

    <script>
        // Puzzle Data
        const puzzle = {
            width: 10,
            height: 10,
            cells: [
                ['A', 'P', 'P', 'L', 'E', '.', '.', 'C', 'A', 'T'],
                ['.', '.', '.', 'I', '.', '.', '.', 'O', '.', 'A'],
                ['B', 'A', 'N', 'A', 'N', 'A', '.', 'D', '.', 'B'],
                ['O', '.', '.', '.', '.', '.', '.', 'E', '.', 'L'],
                ['A', '.', 'M', 'O', 'U', 'S', 'E', '.', '.', 'E'],
                ['T', '.', '.', '.', '.', '.', '.', '.', '.', '.'],
                ['.', '.', 'P', 'I', 'A', 'N', 'O', '.', '.', '.'],
                ['S', '.', '.', '.', '.', '.', '.', '.', 'G', '.'],
                ['U', 'N', 'I', 'T', 'Y', '.', 'D', 'O', 'G', 'S'],
                ['N', '.', '.', '.', '.', '.', '.', '.', 'S', '.']
            ],
            clues: {
                across: [
                    { number: 1, x: 0, y: 0, length: 5, clue: "Common red fruit" },
                    { number: 4, x: 7, y: 0, length: 3, clue: "Meowing pet" },
                    { number: 7, x: 0, y: 2, length: 6, clue: "Long yellow fruit" },
                    { number: 9, x: 2, y: 4, length: 5, clue: "Small squeaky rodent" },
                    { number: 11, x: 2, y: 6, length: 5, clue: "Musical instrument with keys" },
                    { number: 13, x: 0, y: 8, length: 5, clue: "State of being joined as a whole" },
                    { number: 14, x: 6, y: 8, length: 4, clue: "Man's best friends" }
                ],
                down: [
                    { number: 1, x: 0, y: 0, length: 5, clue: "Vessel for water travel" },
                    { number: 2, x: 3, y: 0, length: 4, clue: "Short operatic song" },
                    { number: 3, x: 7, y: 0, length: 4, clue: "Computer instructions" },
                    { number: 5, x: 9, y: 0, length: 5, clue: "Furniture for dining" },
                    { number: 8, x: 0, y: 7, length: 3, clue: "The star at the center of our system" },
                    { number: 10, x: 2, y: 6, length: 3, clue: "Fruit seed" },
                    { number: 12, x: 8, y: 7, length: 3, clue: "Fuel for cars" }
                ]
            }
        };

        let currentCell = { x: 0, y: 0 };
        let currentDirection = 'across'; // 'across' or 'down'

        function initGame() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            
            for (let y = 0; y < puzzle.height; y++) {
                for (let x = 0; x < puzzle.width; x++) {
                    const cellData = puzzle.cells[y][x];
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.x = x;
                    cell.dataset.y = y;

                    if (cellData === '.') {
                        cell.classList.add('black');
                    } else {
                        // Check for clue numbers
                        const acrossClue = puzzle.clues.across.find(c => c.x === x && c.y === y);
                        const downClue = puzzle.clues.down.find(c => c.x === x && c.y === y);
                        const num = acrossClue ? acrossClue.number : (downClue ? downClue.number : null);
                        
                        if (num) {
                            const span = document.createElement('span');
                            span.className = 'cell-number';
                            span.textContent = num;
                            cell.appendChild(span);
                        }

                        cell.addEventListener('click', () => selectCell(x, y));
                        
                        // Internal container for the letter
                        const letterSpan = document.createElement('span');
                        letterSpan.className = 'letter';
                        cell.appendChild(letterSpan);
                    }
                    gridEl.appendChild(cell);
                }
            }

            renderClues();
            selectCell(0, 0);
            
            // Global Keyboard listener
            document.addEventListener('keydown', handleKeyDown);
        }

        function renderClues() {
            const acrossList = document.getElementById('across-clues');
            const downList = document.getElementById('down-clues');

            puzzle.clues.across.forEach(c => {
                const li = document.createElement('li');
                li.className = 'cursor-pointer hover:text-indigo-600 transition p-1 rounded';
                li.innerHTML = `<span class="font-bold mr-2">${c.number}.</span> ${c.clue}`;
                li.onclick = () => { currentDirection = 'across'; selectCell(c.x, c.y); };
                li.id = `clue-across-${c.number}`;
                acrossList.appendChild(li);
            });

            puzzle.clues.down.forEach(c => {
                const li = document.createElement('li');
                li.className = 'cursor-pointer hover:text-indigo-600 transition p-1 rounded';
                li.innerHTML = `<span class="font-bold mr-2">${c.number}.</span> ${c.clue}`;
                li.onclick = () => { currentDirection = 'down'; selectCell(c.x, c.y); };
                li.id = `clue-down-${c.number}`;
                downList.appendChild(li);
            });
        }

        function selectCell(x, y) {
            const cell = puzzle.cells[y][x];
            if (cell === '.') return;

            // Toggle direction if clicking same cell
            if (currentCell.x === x && currentCell.y === y) {
                currentDirection = currentDirection === 'across' ? 'down' : 'across';
            }

            currentCell = { x, y };
            updateUI();
        }

        function updateUI() {
            // Reset highlighting
            document.querySelectorAll('.cell').forEach(c => {
                c.classList.remove('selected', 'highlighted');
            });
            document.querySelectorAll('li').forEach(l => l.classList.remove('bg-indigo-100', 'text-indigo-700'));

            const selectedCell = document.querySelector(`.cell[data-x="${currentCell.x}"][data-y="${currentCell.y}"]`);
            selectedCell.classList.add('selected');

            // Highlight word in current direction
            highlightWord();

            // Find current clue
            const clue = findCurrentClue();
            const bar = document.getElementById('active-clue-bar');
            if (clue) {
                bar.innerHTML = `<span class="font-bold uppercase">${currentDirection} ${clue.number}:</span> ${clue.clue}`;
                const clueLi = document.getElementById(`clue-${currentDirection}-${clue.number}`);
                if (clueLi) {
                    clueLi.classList.add('bg-indigo-100', 'text-indigo-700');
                    clueLi.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }
        }

        function highlightWord() {
            let { x, y } = currentCell;
            if (currentDirection === 'across') {
                // Find start
                let startX = x;
                while (startX > 0 && puzzle.cells[y][startX - 1] !== '.') startX--;
                // Highlight forward
                let curX = startX;
                while (curX < puzzle.width && puzzle.cells[y][curX] !== '.') {
                    document.querySelector(`.cell[data-x="${curX}"][data-y="${y}"]`).classList.add('highlighted');
                    curX++;
                }
            } else {
                let startY = y;
                while (startY > 0 && puzzle.cells[startY - 1][x] !== '.') startY--;
                let curY = startY;
                while (curY < puzzle.height && puzzle.cells[curY][x] !== '.') {
                    document.querySelector(`.cell[data-x="${x}"][data-y="${curY}"]`).classList.add('highlighted');
                    curY++;
                }
            }
        }

        function findCurrentClue() {
            let { x, y } = currentCell;
            if (currentDirection === 'across') {
                while (x > 0 && puzzle.cells[y][x - 1] !== '.') x--;
                return puzzle.clues.across.find(c => c.x === x && c.y === y);
            } else {
                while (y > 0 && puzzle.cells[y - 1][x] !== '.') y--;
                return puzzle.clues.down.find(c => c.x === x && c.y === y);
            }
        }

        function handleKeyDown(e) {
            if (e.key.length === 1 && e.key.match(/[a-z]/i)) {
                setLetter(e.key.toUpperCase());
                moveNext();
            } else if (e.key === 'Backspace') {
                setLetter('');
                moveBack();
            } else if (e.key === 'ArrowRight') {
                currentDirection = 'across';
                moveNext();
            } else if (e.key === 'ArrowLeft') {
                currentDirection = 'across';
                moveBack();
            } else if (e.key === 'ArrowDown') {
                currentDirection = 'down';
                moveNext();
            } else if (e.key === 'ArrowUp') {
                currentDirection = 'down';
                moveBack();
            }
        }

        function setLetter(letter) {
            const cell = document.querySelector(`.cell[data-x="${currentCell.x}"][data-y="${currentCell.y}"]`);
            const span = cell.querySelector('.letter');
            span.textContent = letter;
            cell.classList.remove('correct', 'incorrect');
        }

        function moveNext() {
            let { x, y } = currentCell;
            if (currentDirection === 'across') {
                if (x < puzzle.width - 1 && puzzle.cells[y][x + 1] !== '.') {
                    x++;
                }
            } else {
                if (y < puzzle.height - 1 && puzzle.cells[y + 1][x] !== '.') {
                    y++;
                }
            }
            currentCell = { x, y };
            updateUI();
        }

        function moveBack() {
            let { x, y } = currentCell;
            if (currentDirection === 'across') {
                if (x > 0 && puzzle.cells[y][x - 1] !== '.') {
                    x--;
                }
            } else {
                if (y > 0 && puzzle.cells[y - 1][x] !== '.') {
                    y--;
                }
            }
            currentCell = { x, y };
            updateUI();
        }

        function checkPuzzle() {
            let allCorrect = true;
            let cellsChecked = 0;
            
            document.querySelectorAll('.cell').forEach(cell => {
                if (cell.classList.contains('black')) return;
                
                const x = parseInt(cell.dataset.x);
                const y = parseInt(cell.dataset.y);
                const userLetter = cell.querySelector('.letter').textContent;
                const correctLetter = puzzle.cells[y][x];
                
                if (userLetter) {
                    cellsChecked++;
                    if (userLetter === correctLetter) {
                        cell.classList.add('correct');
                        cell.classList.remove('incorrect');
                    } else {
                        cell.classList.add('incorrect');
                        cell.classList.remove('correct');
                        allCorrect = false;
                    }
                } else {
                    allCorrect = false;
                }
            });

            if (cellsChecked === 0) {
                showToast("Enter some letters first!");
            } else if (allCorrect) {
                showToast("🎉 Perfect! You solved it!");
            } else {
                showToast("Keep going! Some letters are incorrect.");
            }
        }

        function revealWord() {
            const clue = findCurrentClue();
            if (!clue) return;

            for (let i = 0; i < clue.length; i++) {
                let x = clue.x + (currentDirection === 'across' ? i : 0);
                let y = clue.y + (currentDirection === 'down' ? i : 0);
                const cell = document.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`);
                cell.querySelector('.letter').textContent = puzzle.cells[y][x];
                cell.classList.add('correct');
            }
            showToast("Word revealed!");
        }

        function resetGame() {
            document.querySelectorAll('.letter').forEach(span => span.textContent = '');
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('correct', 'incorrect'));
            selectCell(0,0);
            showToast("Grid cleared.");
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 3000);
        }

        window.onload = initGame;
    </script>
</body>
</html>
