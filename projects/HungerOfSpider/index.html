<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Spider Survival</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="ui">
        <div class="stat">Level <span id="lvlD">1</span></div>
        <div class="stat">Score <span id="scoreD">0</span></div>
        <div class="stat">Eaten <span id="ateD">0</span></div>
    </div>
    <canvas id="canvas"></canvas>
    <div id="overlay">
        <h1>🕷️ Spider</h1>
        <p>Move your mouse to guide your spider.<br>
            <b>Eat smaller/same level spiders</b> to grow.<br>
            <b>Avoid spiders 2+ levels above you!</b>
        </p>
        <p style="font-size:12px;color:#888">Enemies are slower now. Most spawns are near your level. Good luck!</p>
        <button class="btn" id="startBtn">Start Game</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
