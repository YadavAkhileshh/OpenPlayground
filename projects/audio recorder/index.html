<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonicVault | Professional Audio Recorder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }

        .record-pulse {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        canvas {
            width: 100%;
            height: 120px;
            border-radius: 12px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md space-y-6">
        <!-- Main Recorder Interface -->
        <div class="glass-card rounded-3xl p-8 shadow-2xl relative overflow-hidden">
            <!-- Header -->
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h1 class="text-2xl font-bold text-white">SonicVault</h1>
                    <p class="text-slate-400 text-sm">Studio Quality Recording</p>
                </div>
                <div id="statusBadge" class="px-3 py-1 bg-slate-800 rounded-full text-[10px] font-bold uppercase tracking-wider text-slate-400 border border-slate-700">
                    Ready
                </div>
            </div>

            <!-- Visualization Area -->
            <div class="bg-slate-900/50 rounded-2xl p-4 mb-8 border border-slate-800">
                <canvas id="visualizer"></canvas>
                <div id="timer" class="text-center mt-4 text-3xl font-mono font-bold text-indigo-400">00:00:00</div>
            </div>

            <!-- Controls -->
            <div class="flex items-center justify-center gap-6">
                <button id="recordBtn" class="w-16 h-16 bg-red-500 hover:bg-red-400 rounded-full flex items-center justify-center transition-all shadow-lg shadow-red-500/20 active:scale-90">
                    <div id="recordIcon" class="w-6 h-6 bg-white rounded-full"></div>
                </button>
                <button id="stopBtn" disabled class="w-14 h-14 bg-slate-700 hover:bg-slate-600 disabled:opacity-30 disabled:cursor-not-allowed rounded-full flex items-center justify-center transition-all active:scale-90">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" class="text-white"><rect x="6" y="6" width="12" height="12" rx="2" /></svg>
                </button>
            </div>
        </div>

        <!-- Library Section -->
        <div class="glass-card rounded-2xl p-6 shadow-xl">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Your Recordings</h2>
            <div id="recordingsList" class="space-y-3 max-h-60 overflow-y-auto custom-scrollbar pr-2">
                <!-- Empty State -->
                <div id="emptyState" class="text-center py-8">
                    <p class="text-slate-500 text-sm">No recordings yet.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let startTime;
        let timerInterval;
        let audioContext;
        let analyser;
        let dataArray;
        let animationId;

        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');
        const recordIcon = document.getElementById('recordIcon');
        const timerDisplay = document.getElementById('timer');
        const statusBadge = document.getElementById('statusBadge');
        const recordingsList = document.getElementById('recordingsList');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        // Setup Visualizer
        function setupVisualizer(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);

            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);

            draw();
        }

        function draw() {
            animationId = requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const barWidth = (canvas.width / dataArray.length) * 2.5;
            let barHeight;
            let x = 0;

            for(let i = 0; i < dataArray.length; i++) {
                barHeight = dataArray[i] / 2;
                ctx.fillStyle = `rgb(99, 102, 241)`;
                ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }
        }

        // Timer Logic
        function updateTimer() {
            const now = Date.now();
            const diff = now - startTime;
            const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            timerDisplay.textContent = `${h}:${m}:${s}`;
        }

        // Recording Actions
        recordBtn.onclick = async () => {
            if (mediaRecorder && mediaRecorder.state === "recording") return;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                setupVisualizer(stream);
                
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    addRecordingToList(audioUrl);
                    stream.getTracks().forEach(track => track.stop());
                    cancelAnimationFrame(animationId);
                };

                mediaRecorder.start();
                
                // UI Updates
                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 1000);
                recordBtn.classList.add('record-pulse');
                recordIcon.classList.replace('rounded-full', 'rounded-sm');
                statusBadge.textContent = 'Recording';
                statusBadge.classList.replace('bg-slate-800', 'bg-red-500/20');
                statusBadge.classList.replace('text-slate-400', 'text-red-400');
                stopBtn.disabled = false;
                recordBtn.disabled = true;

            } catch (err) {
                console.error("Mic access denied:", err);
                alert("Please allow microphone access to record audio.");
            }
        };

        stopBtn.onclick = () => {
            mediaRecorder.stop();
            clearInterval(timerInterval);
            
            // UI Reset
            recordBtn.classList.remove('record-pulse');
            recordIcon.classList.replace('rounded-sm', 'rounded-full');
            statusBadge.textContent = 'Ready';
            statusBadge.classList.replace('bg-red-500/20', 'bg-slate-800');
            statusBadge.classList.replace('text-red-400', 'text-slate-400');
            timerDisplay.textContent = '00:00:00';
            stopBtn.disabled = true;
            recordBtn.disabled = false;
        };

        function addRecordingToList(url) {
            document.getElementById('emptyState').classList.add('hidden');
            const id = Date.now();
            const dateStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const item = document.createElement('div');
            item.className = "bg-slate-800/50 border border-slate-700 rounded-xl p-4 flex flex-col gap-3";
            item.innerHTML = `
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-slate-300">Recording_${id}</span>
                    <span class="text-[10px] text-slate-500">${dateStr}</span>
                </div>
                <audio controls src="${url}" class="w-full h-8 brightness-90 contrast-125"></audio>
                <div class="flex justify-end gap-3">
                    <button onclick="deleteRecording(this)" class="text-[10px] font-bold text-slate-500 hover:text-red-400 uppercase tracking-tighter transition-colors">Delete</button>
                    <a href="${url}" download="recording_${id}.wav" class="text-[10px] font-bold text-indigo-400 hover:text-indigo-300 uppercase tracking-tighter transition-colors">Download</a>
                </div>
            `;
            recordingsList.prepend(item);
        }

        function deleteRecording(btn) {
            btn.closest('div.bg-slate-800\\/50').remove();
            if (recordingsList.children.length === 1) { // Only empty state hidden
                document.getElementById('emptyState').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
