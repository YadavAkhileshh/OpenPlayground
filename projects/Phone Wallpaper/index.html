<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Wallpaper Customizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide-react/0.263.1/lucide-react.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&family=Space+Mono&family=Unbounded:wght@900&display=swap');
        
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .canvas-container {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            aspect-ratio: 9 / 19.5; /* Modern Smartphone Aspect Ratio */
            max-height: 70vh;
            position: relative;
            background: #000;
            border-radius: 40px;
            border: 8px solid #334155;
            overflow: hidden;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 10px;
        }

        input[type="range"] {
            accent-color: #3b82f6;
        }

        .control-group {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row">

    <!-- Left Sidebar: Controls -->
    <aside class="w-full md:w-96 bg-slate-900 p-6 flex flex-col h-screen border-r border-slate-800 z-10 overflow-y-auto custom-scrollbar">
        <div class="mb-8">
            <h1 class="text-2xl font-black bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">WALLCRAFT PRO</h1>
            <p class="text-slate-400 text-xs uppercase tracking-widest mt-1">Advanced Wallpaper Maker</p>
        </div>

        <!-- Section: Background -->
        <div class="control-group">
            <label class="block text-sm font-semibold mb-3">Background Type</label>
            <div class="grid grid-cols-3 gap-2 mb-4">
                <button onclick="setBgType('solid')" class="bg-slate-800 p-2 rounded text-xs hover:bg-slate-700 transition">Solid</button>
                <button onclick="setBgType('gradient')" class="bg-slate-800 p-2 rounded text-xs hover:bg-slate-700 transition">Gradient</button>
                <button onclick="document.getElementById('imgInput').click()" class="bg-slate-800 p-2 rounded text-xs hover:bg-slate-700 transition">Image</button>
                <input type="file" id="imgInput" class="hidden" accept="image/*" onchange="handleImageUpload(event)">
            </div>

            <div id="solidControls">
                <label class="text-xs text-slate-400">Color</label>
                <input type="color" id="solidColor" value="#1e293b" class="w-full h-8 bg-transparent cursor-pointer rounded mt-1" oninput="draw()">
            </div>

            <div id="gradientControls" class="hidden">
                <div class="flex gap-2 mt-2">
                    <input type="color" id="grad1" value="#3b82f6" class="flex-1 h-8 bg-transparent cursor-pointer" oninput="draw()">
                    <input type="color" id="grad2" value="#10b981" class="flex-1 h-8 bg-transparent cursor-pointer" oninput="draw()">
                </div>
                <label class="text-xs text-slate-400 mt-2 block">Angle</label>
                <input type="range" id="gradAngle" min="0" max="360" value="45" class="w-full" oninput="draw()">
            </div>
        </div>

        <!-- Section: Overlays & Patterns -->
        <div class="control-group">
            <label class="block text-sm font-semibold mb-3">Pattern Overlay</label>
            <select id="patternType" class="w-full bg-slate-800 border-none rounded p-2 text-sm" onchange="draw()">
                <option value="none">None</option>
                <option value="dots">Polka Dots</option>
                <option value="grid">Minimal Grid</option>
                <option value="noise">Film Grain</option>
                <option value="scanlines">Retro Scanlines</option>
            </select>
            <label class="text-xs text-slate-400 mt-3 block">Pattern Opacity</label>
            <input type="range" id="patternOpacity" min="0" max="100" value="20" class="w-full" oninput="draw()">
        </div>

        <!-- Section: Typography -->
        <div class="control-group">
            <div class="flex justify-between items-center mb-3">
                <label class="text-sm font-semibold">Typography</label>
                <input type="checkbox" id="showText" checked onchange="draw()">
            </div>
            <input type="text" id="wallText" placeholder="Enter text..." value="PERSPECTIVE" class="w-full bg-slate-800 border-none rounded p-2 text-sm mb-3" oninput="draw()">
            
            <label class="text-xs text-slate-400 block">Font Style</label>
            <select id="fontFamily" class="w-full bg-slate-800 border-none rounded p-2 text-sm mb-3" onchange="draw()">
                <option value="Unbounded">Ultra Bold</option>
                <option value="Inter">Modern Sans</option>
                <option value="Playfair Display">Elegant Serif</option>
                <option value="Space Mono">Cyber Mono</option>
            </select>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="text-xs text-slate-400">Size</label>
                    <input type="range" id="fontSize" min="20" max="200" value="80" class="w-full" oninput="draw()">
                </div>
                <div>
                    <label class="text-xs text-slate-400">Y-Position</label>
                    <input type="range" id="textY" min="0" max="100" value="50" class="w-full" oninput="draw()">
                </div>
            </div>
            <div class="mt-2">
                <label class="text-xs text-slate-400">Color</label>
                <input type="color" id="textColor" value="#ffffff" class="w-full h-8 bg-transparent cursor-pointer" oninput="draw()">
            </div>
        </div>

        <!-- Section: Filters -->
        <div class="control-group">
            <label class="block text-sm font-semibold mb-3">Post-Process Filters</label>
            <div class="space-y-2">
                <div class="flex justify-between text-xs"><span>Brightness</span><span id="v_bright">100%</span></div>
                <input type="range" id="bright" min="0" max="200" value="100" class="w-full" oninput="draw()">
                
                <div class="flex justify-between text-xs"><span>Contrast</span><span id="v_contrast">100%</span></div>
                <input type="range" id="contrast" min="0" max="200" value="100" class="w-full" oninput="draw()">

                <div class="flex justify-between text-xs"><span>Saturation</span><span id="v_saturate">100%</span></div>
                <input type="range" id="saturate" min="0" max="200" value="100" class="w-full" oninput="draw()">
            </div>
        </div>

        <button onclick="downloadWallpaper()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-blue-900/20 mt-auto">
            Export High-Res (9:19.5)
        </button>
    </aside>

    <!-- Main View: Canvas -->
    <main class="flex-1 flex flex-col items-center justify-center p-4 md:p-10 relative">
        <div class="text-center mb-6">
            <span class="bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Live Preview</span>
        </div>
        
        <div class="canvas-container" id="container">
            <canvas id="wallpaperCanvas"></canvas>
        </div>

        <div class="mt-8 text-slate-500 text-xs text-center max-w-xs">
            Optimized for iPhone 15/16 Pro & modern Android displays. 
            All rendering happens locally in your browser.
        </div>
    </main>

    <script>
        const canvas = document.getElementById('wallpaperCanvas');
        const ctx = canvas.getContext('2d');
        let bgType = 'gradient';
        let uploadedImage = null;

        // Set high-res dimensions (iPhone 15 Pro resolution approx)
        const WIDTH = 1179;
        const HEIGHT = 2556;

        function init() {
            canvas.width = WIDTH;
            canvas.height = HEIGHT;
            
            // Adjust canvas display size to fit container
            const container = document.getElementById('container');
            const displayWidth = container.clientWidth;
            canvas.style.width = '100%';
            canvas.style.height = '100%';

            draw();
        }

        function setBgType(type) {
            bgType = type;
            document.getElementById('solidControls').classList.toggle('hidden', type !== 'solid');
            document.getElementById('gradientControls').classList.toggle('hidden', type !== 'gradient');
            draw();
        }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    uploadedImage = img;
                    bgType = 'image';
                    setBgType('image'); // Hide other controls
                    draw();
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }

        function drawPatterns() {
            const type = document.getElementById('patternType').value;
            const opacity = document.getElementById('patternOpacity').value / 100;
            if (type === 'none') return;

            ctx.save();
            ctx.globalAlpha = opacity;
            ctx.fillStyle = '#ffffff';

            if (type === 'dots') {
                for (let x = 0; x < WIDTH; x += 60) {
                    for (let y = 0; y < HEIGHT; y += 60) {
                        ctx.beginPath();
                        ctx.arc(x, y, 4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            } else if (type === 'grid') {
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1;
                for (let x = 0; x < WIDTH; x += 100) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0); ctx.lineTo(x, HEIGHT);
                    ctx.stroke();
                }
                for (let y = 0; y < HEIGHT; y += 100) {
                    ctx.beginPath();
                    ctx.moveTo(0, y); ctx.lineTo(WIDTH, y);
                    ctx.stroke();
                }
            } else if (type === 'noise') {
                for (let i = 0; i < 200000; i++) {
                    const x = Math.random() * WIDTH;
                    const y = Math.random() * HEIGHT;
                    ctx.fillRect(x, y, 2, 2);
                }
            } else if (type === 'scanlines') {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                for (let y = 0; y < HEIGHT; y += 10) {
                    ctx.fillRect(0, y, WIDTH, 4);
                }
            }
            ctx.restore();
        }

        function drawText() {
            if (!document.getElementById('showText').checked) return;

            const text = document.getElementById('wallText').value;
            const size = document.getElementById('fontSize').value;
            const yPercent = document.getElementById('textY').value;
            const color = document.getElementById('textColor').value;
            const family = document.getElementById('fontFamily').value;

            ctx.save();
            ctx.font = `${size}px "${family}"`;
            ctx.fillStyle = color;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Text shadow for depth
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 20;
            ctx.shadowOffsetY = 10;

            const x = WIDTH / 2;
            const y = (HEIGHT * yPercent) / 100;
            
            ctx.fillText(text, x, y);
            ctx.restore();
        }

        function draw() {
            // Update value labels
            document.getElementById('v_bright').innerText = document.getElementById('bright').value + '%';
            document.getElementById('v_contrast').innerText = document.getElementById('contrast').value + '%';
            document.getElementById('v_saturate').innerText = document.getElementById('saturate').value + '%';

            // Clear canvas
            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            // Apply Filters
            const b = document.getElementById('bright').value;
            const c = document.getElementById('contrast').value;
            const s = document.getElementById('saturate').value;
            ctx.filter = `brightness(${b}%) contrast(${c}%) saturate(${s}%)`;

            // Draw Background
            if (bgType === 'solid') {
                ctx.fillStyle = document.getElementById('solidColor').value;
                ctx.fillRect(0, 0, WIDTH, HEIGHT);
            } else if (bgType === 'gradient') {
                const angle = document.getElementById('gradAngle').value * (Math.PI / 180);
                const x2 = WIDTH * Math.cos(angle);
                const y2 = HEIGHT * Math.sin(angle);
                const grad = ctx.createLinearGradient(0, 0, x2, y2);
                grad.addColorStop(0, document.getElementById('grad1').value);
                grad.addColorStop(1, document.getElementById('grad2').value);
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, WIDTH, HEIGHT);
            } else if (bgType === 'image' && uploadedImage) {
                // Cover behavior for image
                const scale = Math.max(WIDTH / uploadedImage.width, HEIGHT / uploadedImage.height);
                const x = (WIDTH / 2) - (uploadedImage.width / 2) * scale;
                const y = (HEIGHT / 2) - (uploadedImage.height / 2) * scale;
                ctx.drawImage(uploadedImage, x, y, uploadedImage.width * scale, uploadedImage.height * scale);
            }

            ctx.filter = 'none'; // Reset filter for patterns and text for clarity
            
            drawPatterns();
            drawText();
        }

        function downloadWallpaper() {
            // Use temporary canvas for highest quality download without display scaling artifacts
            const link = document.createElement('a');
            link.download = `wallpaper_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        }

        // Initialize and respond to resize
        window.addEventListener('load', init);
        window.addEventListener('resize', () => {
             // Redraw to ensure responsiveness of UI
             draw();
        });

        // Wait for fonts to load before drawing
        document.fonts.ready.then(draw);

    </script>
</body>
</html>
